    <style>

        function canvasMediaPreviewUrl(url, size=512){
            const raw = String(url || '');
            if(!raw || raw.startsWith('data:') || raw.startsWith('blob:')) return raw;
            if(!raw.startsWith('/output/') && !raw.startsWith('/assets/')) return raw;
            if(!/\.(png|jpe?g|webp|gif)(\?|#|$)/i.test(raw)) return raw;
            const width = Math.max(64, Math.min(2048, Math.round(Number(size) || 512)));
            return `/api/media-preview?w=${width}&url=${encodeURIComponent(raw)}`;
        }
        function canvasPreviewImgHtml(url, size=512, attrs=''){
            const original = String(url || '');
            const preview = canvasMediaPreviewUrl(original, size);
            return `<img src="${escapeAttr(preview)}" data-preview-src="${escapeAttr(preview)}" data-original-src="${escapeAttr(original)}" data-url="${escapeAttr(original)}"${attrs ? ` ${attrs}` : ''}>`;
        }

                minimapRenderQueued = false;
                renderMinimap();
            });
        }
        function renderMinimap(){
            if(!minimapContent || !minimapViewport) return;
            const bounds = minimapBounds();
            const cw = minimapContent.clientWidth || 172;
            const ch = minimapContent.clientHeight || 110;
            const scale = Math.min(cw / bounds.w, ch / bounds.h);
            const mapW = bounds.w * scale;
            const mapH = bounds.h * scale;
            const ox = (cw - mapW) / 2;
            const oy = (ch - mapH) / 2;
            minimapState = {bounds, scale, ox, oy, cw, ch};
            const nodeHtml = (nodes || []).map(n => {
                const r = estimatedNodeRect(n);
                return `<div class="minimap-node ${selected.has(n.id) ? 'selected' : ''}" style="left:${ox + (r.x - bounds.x) * scale}px;top:${oy + (r.y - bounds.y) * scale}px;width:${Math.max(3, r.w * scale)}px;height:${Math.max(3, r.h * scale)}px"></div>`;
            }).join('');
            minimapContent.innerHTML = `${nodeHtml}${nodes?.length ? '' : '<div class="minimap-empty">EMPTY</div>'}<div id="minimapViewport" class="minimap-viewport"></div>`;
            minimapViewport = document.getElementById('minimapViewport');
            updateMinimapViewport();
        }
        function updateMinimapViewport(){
            if(!minimapViewport || !minimapState) return;
            const r = currentWorldViewRect();
            const {bounds, scale, ox, oy} = minimapState;
            minimapViewport.style.left = `${ox + (r.x - bounds.x) * scale}px`;
            minimapViewport.style.top = `${oy + (r.y - bounds.y) * scale}px`;
            minimapViewport.style.width = `${Math.max(8, r.w * scale)}px`;
            minimapViewport.style.height = `${Math.max(8, r.h * scale)}px`;
        }
        function minimapEventToWorld(e){
            if(!minimapState) renderMinimap();
            const state = minimapState;
            const rect = minimapContent.getBoundingClientRect();
            const x = (e.clientX - rect.left - state.ox) / state.scale + state.bounds.x;
            const y = (e.clientY - rect.top - state.oy) / state.scale + state.bounds.y;
            return {x, y};
        }
        function centerViewportOnWorldPoint(point){
            const rect = board.getBoundingClientRect();
            viewport.x = rect.width / 2 - point.x * viewport.scale;
            viewport.y = rect.height / 2 - point.y * viewport.scale;
            applyViewport();
            renderLinks();
            renderSelectionHub();
        }

        function hasActiveCanvasWork(){
            return nodes.some(n =>
                n.running || n.checking ||
                ['queued','submitted','checking','running'].includes(String(n.runStatus || '')) ||
                (n.type === 'output' && (n._pending || []).length)
            );
        }
        function isEditingCanvasText(){
            const active = document.activeElement;
            return !!active && nodesEl.contains(active) && ['TEXTAREA','INPUT','SELECT'].includes(active.tagName);
        }
        function shouldDeferRemoteCanvasSync(){
            return localCanvasDirty || savingCanvasNow || hasActiveCanvasWork() || isEditingCanvasText() || isCanvasInteractionActive();

        function markCanvasDirty(){
            if(!canvas) return;
            localCanvasDirty = true;
            canvasDirtyToken += 1;

        function scheduleSave(){
            if(!canvas) return;
            markCanvasDirty();
            setStatus('Saving...');
            clearTimeout(saveTimer);
            saveTimer = setTimeout(saveCanvas, 500);
        }
        function refreshOutputTimer(){
            const hasPending = nodes.some(n => n.type === 'output' && (n._pending || []).length);
            if(hasPending && !outputTimer){
                outputTimer = setInterval(() => {
                    const pendingById = new Map();
                    nodes.filter(n => n.type === 'output').forEach(node => {
                        (node._pending || []).forEach(p => pendingById.set(p.id, p));
                    });
                    if(pendingById.size){
                        document.querySelectorAll('.output-time-pill.running').forEach(pill => {
                            const pendingId = pill.closest('[data-pending-id]')?.dataset.pendingId;
                            const pending = pendingById.get(pendingId);
                            if(pending) pill.textContent = formatRunDuration(nowMs() - Number(pending.startedAt || nowMs()));
                        });
                    } else {
                        clearInterval(outputTimer);
                        outputTimer = null;
                    }
                }, 1000);
            } else if(!hasPending && outputTimer){
                clearInterval(outputTimer);
                outputTimer = null;
            }
        }
        async function saveCanvas(retryAfterConflict=false){
            if(!canvas) return;
            saveTimer = null;
            normalizeCanvasState();
            sanitizeConnections();
            canvas.nodes = nodes;
            canvas.connections = connections;
            canvas.viewport = viewport;
            savingCanvasNow = true;
            const savingToken = canvasDirtyToken;
            try {
                const baseUpdatedAt = Number(lastCanvasUpdatedAt || canvas.updated_at || 0);
                const res = await fetch(`/api/canvases/${canvas.id}`, {
                    method:'PUT',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ title:canvas.title, icon:canvas.icon || '🧩', nodes, connections, viewport, logs:canvas.logs || [], settings:canvas.settings || {}, base_updated_at: baseUpdatedAt, client_id: CLIENT_ID })
                });
                if(res.status === 409){
                    const conflict = await res.json().catch(() => ({}));
                    const remote = conflict?.detail?.canvas;
                    if(remote && (localCanvasDirty || hasActiveCanvasWork())){
                        lastCanvasUpdatedAt = Number(remote.updated_at || lastCanvasUpdatedAt || Date.now());
                        canvas.updated_at = lastCanvasUpdatedAt;
                        if(!retryAfterConflict) await saveCanvas(true);
                        else {
                            clearTimeout(saveTimer);
                            saveTimer = setTimeout(saveCanvas, 1000);
                            setStatus('Saving...');
                        }
                        return;
                    } else if(remote) {
                        applyRemoteCanvasData(remote);
                        setStatus('Synced');
                        return;
                    }
                    setStatus('Save conflict');
                    return;
                }
                if(!res.ok) throw new Error('save failed');
                const data = await res.json().catch(() => ({}));
                const savedAt = Number(data?.canvas?.updated_at || Date.now());
                canvas.updated_at = savedAt;
                lastCanvasUpdatedAt = savedAt;
                if(savingToken === canvasDirtyToken) localCanvasDirty = false;
                if(currentCanvasTime) currentCanvasTime.textContent = formatCanvasTime(canvas.updated_at);
                setStatus('Saved');
                loadCanvasList(false);
            } catch(e) {
                setStatus('Save failed');
                console.error(e);
            } finally {
                savingCanvasNow = false;
                if(deferredRemoteCanvasSync && !shouldDeferRemoteCanvasSync()){
                    deferredRemoteCanvasSync = false;
                    clearTimeout(remoteSyncTimer);
                    remoteSyncTimer = setTimeout(syncRemoteCanvasNow, 120);
                }
            }
        }
        function applyRemoteCanvasData(remote){
            if(!remote || !canvas || remote.id !== canvas.id) return;
            if(shouldDeferRemoteCanvasSync()){
                deferredRemoteCanvasSync = true;
                return;
            }
            applyingRemoteCanvas = true;
            try {
                canvas = remote;
                canvas.logs = canvas.logs || [];
                nodes = canvas.nodes || [];
                connections = canvas.connections || [];
                viewport = canvas.viewport || {x:0, y:0, scale:1};
                normalizeCanvasState();
                lastCanvasUpdatedAt = Number(canvas.updated_at || Date.now());
                localCanvasDirty = false;
                nodes.forEach(n => { if(n.running) n.running = false; });
                sanitizeConnections();
                pruneMissingComfyWorkflows();
                refreshMissingCanvasAssets().then(() => render());
                selected.clear();
                renderCanvasList();
                render();
                if(currentCanvasTitle) currentCanvasTitle.textContent = canvas.title || tr('canvas.untitled');
                if(currentCanvasTime) currentCanvasTime.textContent = formatCanvasTime(canvas.updated_at || canvas.created_at);
                setStatus('Synced');
            } finally {
                applyingRemoteCanvas = false;
            }
        }
        function canvasLocalAssetUrls(){
            const urls = new Set();
            const add = value => {
                const url = outputUrlValue(value);
                if(url && (url.startsWith('/output/') || url.startsWith('/assets/'))) urls.add(url);
            };
            nodes.forEach(node => {
                if(node.url) add(node.url);
                (node.images || []).forEach(add);
                (node.generatedOutputs || []).forEach(add);
                Object.entries(node.imageComparisons || {}).forEach(([key, value]) => {
                    add(key);
                    add(value);
                });
            });
            (canvas?.logs || []).forEach(log => {
                (log.outputs || []).forEach(add);
                (log.refs || []).forEach(add);
                (log.run?.refs || []).forEach(add);
            });
            return [...urls];
        }
        async function refreshMissingCanvasAssets(){
            missingAssetUrls.clear();
            const urls = canvasLocalAssetUrls();
            if(!urls.length) return;
            try {
                const data = await fetch('/api/canvas-assets/check', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({urls})
                }).then(r => r.json());
                const exists = data.exists || {};
                Object.entries(exists).forEach(([url, ok]) => { if(!ok) missingAssetUrls.add(url); });
            } catch(e) {
                console.warn('canvas asset check failed', e);
            }
        }
        async function syncRemoteCanvasNow(){
            if(!canvas) return;
            if(shouldDeferRemoteCanvasSync()){
                deferredRemoteCanvasSync = true;
                return;
            }
            try {
                const res = await fetch(`/api/canvases/${canvas.id}`);
                if(!res.ok) throw new Error(tr('canvas.openFailed'));
                const data = await res.json();
                const remote = data.canvas;
                if(Number(remote?.updated_at || 0) >= Number(lastCanvasUpdatedAt || 0)){
                    applyRemoteCanvasData(remote);
                }
            } catch(e) {
                console.error(e);
                setStatus('Sync failed');
            }
        }
        async function checkRemoteCanvasVersion(){
            if(!canvas || applyingRemoteCanvas || remoteSyncBusy) return;
            if(document.hidden) return;
            if(shouldDeferRemoteCanvasSync()){
                deferredRemoteCanvasSync = true;
                return;
            }
            remoteSyncBusy = true;
            try {
                const res = await fetch(`/api/canvases/${canvas.id}/meta`);
                if(!res.ok) throw new Error('meta failed');
                const meta = await res.json();
                const remoteUpdatedAt = Number(meta.updated_at || 0);
                if(remoteUpdatedAt > Number(lastCanvasUpdatedAt || 0)){
                    await syncRemoteCanvasNow();
                }
            } catch(e) {
                /* 轮询失败下一轮再试 */
            } finally {
                remoteSyncBusy = false;
            }
        }
        function startCanvasRemotePolling(){
            stopCanvasRemotePolling();
            remoteSyncInterval = setInterval(checkRemoteCanvasVersion, 2500);
        }
        function stopCanvasRemotePolling(){
            if(remoteSyncInterval){
                clearInterval(remoteSyncInterval);
                remoteSyncInterval = null;
            }
        }
        function handleCanvasUpdatedMessage(data){
            if(!canvas || !data || data.type !== 'canvas_updated') return;
            if(data.client_id && data.client_id === CLIENT_ID) return;
            if(data.canvas_id !== canvas.id) return;
            const remoteUpdatedAt = Number(data.updated_at || 0);
            if(remoteUpdatedAt && remoteUpdatedAt <= Number(lastCanvasUpdatedAt || 0)) return;
            if(shouldDeferRemoteCanvasSync()){
                deferredRemoteCanvasSync = true;
                return;
            }
            clearTimeout(remoteSyncTimer);
            remoteSyncTimer = setTimeout(syncRemoteCanvasNow, savingCanvasNow ? 700 : 120);
            setStatus('Syncing...');
        }

        async function loadConfig(){
            loadLocalModelLists();

                imageModels = cfg.image_models?.length ? cfg.image_models : imageModels;
                chatModels = cfg.chat_models?.length ? cfg.chat_models : chatModels;
                videoModels = cfg.video_models?.length ? cfg.video_models : DEFAULT_VIDEO_MODELS;
                msChatModels = cfg.ms_chat_models?.length ? cfg.ms_chat_models : msChatModels;
                comfyBackendCount = Math.max(1, (cfg.comfy_instances || []).length || 1);

                models.nano = imageModels.find(m => m.toLowerCase().includes('nano')) || 'nano-banana-pro';

                try {
                    const wf = await fetch('/api/workflows').then(r=>r.json());

        // 监听 API 设置页面的变更广播，实时刷新画布的模型/平台下拉
        try {
            const apiChannel = new BroadcastChannel('studio-api');
            apiChannel.onmessage = async (e) => {
                if(e.data?.type === 'providers-changed' || e.data?.type === 'workflows-changed'){

        });

                    headers:{'Content-Type':'application/json'},

            const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;

            const stageRect = stage.getBoundingClientRect();
            const mx = event.clientX - stageRect.left; // 鼠标在 stage 内偏移
            const my = event.clientY - stageRect.top;
            const contentX = stage.scrollLeft + mx;
            const contentY = stage.scrollTop + my;

        async function loadPortraitAssetGroups(nodeId){
            const node = nodes.find(n => n.id === nodeId);
            if(!node || !portraitAssetUsesGroups(node)) return;
            const pageSize = 100;
            const groups = [];
            const seen = new Set();
            let total = 0;
            for(let page = 1; page <= 50; page++) {
                const data = await portraitFetchJson('/api/volcengine/assets/groups', {
                    group_type:portraitAssetLibraryType(node),
                    query:'',
                    page,
                    page_size:pageSize
                });
                const items = Array.isArray(data.items) ? data.items : [];
                total = Number(data.total || total || 0) || 0;
                items.forEach(group => {
                    const key = group.id || group.name || JSON.stringify(group);
                    if(seen.has(key)) return;
                    seen.add(key);
                    groups.push(group);
                });
                if(!items.length || items.length < pageSize || (total && groups.length >= total)) break;
            }
            node.groups = groups;
            node.groupTotal = total || groups.length;
            if(node.groupId && !node.groups.some(g => g.id === node.groupId)) node.groupId = '';
        }
        async function loadPortraitAssets(nodeId, opts={}){
            const node = nodes.find(n => n.id === nodeId);
            if(!node || (node.loading && opts.append)) return;
            const libraryType = portraitAssetLibraryType(node);
            const append = opts.append === true;
            if(!append && node._portraitAbortController) {
                try { node._portraitAbortController.abort(); } catch(_) {}
            }
            const abortController = !append && window.AbortController ? new AbortController() : null;
            if(abortController) node._portraitAbortController = abortController;
            const requestSeq = (Number(node._portraitRequestSeq || 0) || 0) + 1;
            node._portraitRequestSeq = requestSeq;
            node.loading = true;
            node.error = '';
            node.notice = '';
            if(!append) {
                node.page = 1;
                node.assets = [];
                node.total = 0;
                node.hasMore = false;
            }
            refreshNodes([node.id], {geometry:false});
            try {
                if(portraitAssetUsesGroups(node) && !append && !(node.groups || []).length) await loadPortraitAssetGroups(node.id);
                if(libraryType === 'PresetVirtual' && !node.presetFilterOptions && !node._presetFilterOptionsLoading) {
                    loadPortraitPresetFilterOptions(node.id).then(() => {
                        refreshNodes([node.id], {geometry:false});
                        scheduleSave();
                    });
                }
                const page = append ? Math.max(1, Number(node.page || 1) + 1) : 1;
                const data = portraitAssetUsesGroups(node)
                    ? await portraitFetchJson('/api/volcengine/assets/list', {
                        group_type:libraryType,
                        group_id:node.groupId || '',
                        query:node.query || '',
                        statuses:['Active'],
                        page,
                        page_size:24
                    }, {signal:abortController?.signal})
                    : await portraitFetchJson('/api/volcengine/preset-portraits/search', {
                        query:node.query || '',
                        ...portraitPresetFilterPayload(node),
                        page,
                        page_size:24
                    }, {signal:abortController?.signal});
                if(node._portraitRequestSeq !== requestSeq) return;
                const incoming = data.items || [];
                node.page = Number(data.page || page) || page;
                node.total = Number(data.total || 0) || 0;
                node.assets = append ? [...(node.assets || []), ...incoming] : incoming;
                node.hasMore = node.total > node.assets.length;
                if(node.selectedAsset && !node.assets.some(a => a.asset_id === node.selectedAsset.asset_id)) {
                    const match = incoming.find(a => a.asset_id === node.selectedAsset.asset_id);
                    if(match) node.selectedAsset = match;
                }
            } catch(err) {
                if(err?.name === 'AbortError') return;
                if(node._portraitRequestSeq !== requestSeq) return;
                const message = err.message || '人像素材库加载失败';
                node.error = message;
            } finally {

        async function runMsGenNode(nodeId, opts={}){
            const node = nodes.find(n => n.id === nodeId);
            if(!node || (node.running && !opts.cascade)) return;
            const sources = orderedSources(node, generatorSources(node));
            const prompt = sources.map(s => s.prompt).filter(Boolean).join('\n\n');
            const refs = sources.flatMap(s => s.refs || []);
            const modelKey = node.msgenModel || 'zimage';
            const msModel = MS_GEN_MODELS[modelKey] || MS_GEN_MODELS.zimage;
            const msModelId = currentMsModelId(modelKey, node);
            const msLoras = modelscopeLorasForModel(msModelId);
            if(!prompt){ showErrorModal(tr('canvas.needPrompt')); return; }
            if(msModel.supportsImage && !refs.length){ showErrorModal(tr('canvas.needImage')); return; }
            const count = Math.max(1, Math.min(8, Number(node.count || 1)));
            // 找或创建 output 节点，立即添加 loading 占位
            let out = connections.filter(c => c.from===node.id).map(c => nodes.find(n => n.id===c.to)).find(n => n?.type==='output');
            if(!out){
                out = {id:uid('out'), type:'output', x:node.x + (Number(node.w)||340) + 28, y:node.y, images:[]};
                nodes.push(out);
                connections.push({id:uid('c'), from:node.id, to:out.id});
            }
            const pendingIds = Array.from({length:count}, () => uid('p'));
            const run = runSnapshot(node, prompt, refs);
            out._pending = [...(out._pending || []), ...pendingIds.map(id => makePending(id, run))];
            if(!opts.cascade){ node.running = true; render(); setTimeout(() => { node.running = false; render(); }, 2000); }
            scheduleSave();
            try {
                const size = apiImageSize(node.msRatio ?? 'square', node.msResolution || '1k', node.msCustomRatio || '', node.msCustomSize || '');
                const parsed = parseSizeValue(size);
                let width = Number(parsed?.width) || 1024;
                let height = Number(parsed?.height) || 1024;
                if(!parsed && node.msWidth && node.msHeight){
                    width = Number(node.msWidth) || width;
                    height = Number(node.msHeight) || height;
                }
                const imageUrls = [];
                if(msModel.supportsImage || msModel.acceptsImage){
                    for(const ref of refs.slice(0,3)){
                        if(ref.url){
                            try { imageUrls.push(await urlToBase64(ref.url)); }
                            catch(e){ imageUrls.push(ref.url); }
                        }
                    }
                }
                const submitMs = async () => {
                    let apiBody;
                    if(modelKey === 'zimage'){
                        apiBody = { prompt, resolution: `${width}x${height}`, client_id: CLIENT_ID };
                    } else if(modelKey === 'qwen_edit'){
                        apiBody = { prompt, image_urls: imageUrls, resolution: `${width}x${height}`, client_id: CLIENT_ID };
                    } else if(modelKey === 'custom'){
                        apiBody = {
                            prompt,
                            model: node.msCustomModel || modelscopeImageModels()[0] || 'Tongyi-MAI/Z-Image-Turbo',
                            image_urls: imageUrls,
                            width,
                            height,
                            size: `${width}x${height}`,
                            client_id: CLIENT_ID
                        };
                    } else {
                        apiBody = { prompt, model: msModel.modelId, image_urls: imageUrls, width, height, size:`${width}x${height}`, client_id: CLIENT_ID };
                    }
                    if(node.msLoraEnabled){
                        const selected = msLoras.find(lora => String(lora.id || '').trim() === String(node.msLoraId || '').trim()) || msLoras[0];
                        const loraId = String(selected?.id || node.msLoraId || '').trim();
                        if(!loraId) throw new Error(tr('canvas.noLoraBoundError'));
                        apiBody.loras = { [loraId]: Number(node.msLoraStrength ?? selected?.strength ?? 0.8) };
                    }
                    const res = await fetch(msModel.endpoint, {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body:JSON.stringify(apiBody)
                    });
                    if(!res.ok) throw new Error(await responseErrorMessage(res, tr('canvas.msFailed')));
                    return await res.json();
                };
                const results = await Promise.all(Array.from({length:count}, submitMs));
                const metas = collectRunMetas(out, pendingIds);
                const outputUrls = results.map(data => data.url).filter(Boolean);
                run.request = results[0] ? requestMetaFromResult(results[0]) : {};
                out._pending = (out._pending || []).filter(p => !pendingIds.includes(p.id));
                appendOutputImages(out, outputUrls, refs[0], metas);
                addGenerationLog({run, outputs:outputUrls, runMs:Math.max(...metas.map(m => m.runMs || 0), 0)});
                node.runStatus = 'done'; node.runError = '';
                render();
                scheduleSave();
            } catch(err){
                const metas = collectRunMetas(out, pendingIds);
                addGenerationLog({run, outputs:[], runMs:Math.max(...metas.map(m => m.runMs || 0), 0), error:err.message || String(err)});
                out._pending = (out._pending || []).filter(p => !pendingIds.includes(p.id));
                node.runStatus = 'failed'; node.runError = err.message || String(err);
                render();
                scheduleSave();
                if(opts.cascade) throw err;
                showErrorModal(err.message || tr('canvas.msFailed'));
            }
        }

        function imageUrlFromDataTransfer(dataTransfer){
            if(!dataTransfer) return '';
            const values = [
                dataTransfer.getData?.('text/uri-list') || '',
                dataTransfer.getData?.('text/plain') || ''
            ].join('\n');
            const html = dataTransfer.getData?.('text/html') || '';
            const htmlMatch = html.match(/<img[^>]+src=["']([^"']+)["']/i);
            const candidates = [
                htmlMatch?.[1] || '',
                ...values.split(/\r?\n/)
            ].map(s => String(s || '').trim()).filter(Boolean);
            return candidates.find(s => /^https?:\/\/.+/i.test(s) || /^data:image\//i.test(s) || /^blob:/i.test(s)) || '';
        }

        function webgenBridgeImageFromDataTransfer(dataTransfer){
            if(!hasWebgenBridgeImageDrag(dataTransfer)) return null;
            try {
                const raw = dataTransfer.getData('application/x-webgen-bridge-image') || '';
                return raw ? JSON.parse(raw) : null;
            } catch(_) {
                return null;
            }
        }
        function dataUrlToImageBlob(dataUrl){
            if(!/^data:image\//i.test(dataUrl || '') || !String(dataUrl).includes(',')) return null;
            const [header, encoded] = String(dataUrl).split(',', 2);
            const mime = (header.match(/^data:([^;]+)/i) || [])[1] || 'image/png';
            const raw = atob(encoded);
            const bytes = new Uint8Array(raw.length);
            for(let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            return new Blob([bytes], {type:mime});
        }

        function gridSplitRects(width, height){

            const {rows, cols, gap} = gridSplitSettings();
            const halfGap = gap / 2;
            const rects = [];
            for(let row = 0; row < rows; row++){
                const topLine = row * height / rows;
                const bottomLine = (row + 1) * height / rows;
                const y1 = Math.round(row === 0 ? 0 : topLine + halfGap);
                const y2 = Math.round(row === rows - 1 ? height : bottomLine - halfGap);
                for(let col = 0; col < cols; col++){
                    const leftLine = col * width / cols;
                    const rightLine = (col + 1) * width / cols;
                    const x1 = Math.round(col === 0 ? 0 : leftLine + halfGap);
                    const x2 = Math.round(col === cols - 1 ? width : rightLine - halfGap);
                    if(x2 > x1 && y2 > y1) rects.push({row, col, x:x1, y:y1, w:x2 - x1, h:y2 - y1});

            }

        function gridSplitRectsCustom(width, height){
            const gap = Math.max(0, Math.min(240, Number(document.getElementById('gridGapSize')?.value || 0)));
            const halfGap = gap / 2;
            // 按方向归类，转换为像素位置（去重并排序）
            const rawH = [...new Set(gridCustomLines.filter(l => l.type === 'h').map(l => l.pos * height))].sort((a, b) => a - b);
            const rawV = [...new Set(gridCustomLines.filter(l => l.type === 'v').map(l => l.pos * width))].sort((a, b) => a - b);
            const hCuts = [0, ...rawH, height]; // 切割边界（含图片两端）
            const vCuts = [0, ...rawV, width];
            const rects = [];
            for(let row = 0; row < hCuts.length - 1; row++){
                for(let col = 0; col < vCuts.length - 1; col++){
                    const y1 = Math.round(row === 0 ? hCuts[row] : hCuts[row] + halfGap);
                    const y2 = Math.round(row === hCuts.length - 2 ? hCuts[row + 1] : hCuts[row + 1] - halfGap);
                    const x1 = Math.round(col === 0 ? vCuts[col] : vCuts[col] + halfGap);
                    const x2 = Math.round(col === vCuts.length - 2 ? vCuts[col + 1] : vCuts[col + 1] - halfGap);
                    if(x2 > x1 && y2 > y1) rects.push({row, col, x:x1, y:y1, w:x2 - x1, h:y2 - y1});

        function refreshGridSplitPreview(){
            const canvasEl = editDrawCanvas();
            const ctx = canvasEl.getContext('2d');
            ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
            if(imageEditMode !== 'grid') return;
            const countEl = document.getElementById('gridSplitCount');
            const lineWidth = Math.max(2, Math.round(Math.min(canvasEl.width, canvasEl.height) / 320));
            const drawGuideLine = (x1, y1, x2, y2) => {
                ctx.save();
                ctx.lineWidth = lineWidth + 2;
                ctx.strokeStyle = 'rgba(2,6,23,0.72)';
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                ctx.lineWidth = lineWidth;
                ctx.strokeStyle = 'rgba(255,255,255,0.92)';
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                ctx.restore();
            };
            if(gridCustomMode){
                // 自定义模式：按已放置线渲染（包含空心范围预览）
                const gap = Math.max(0, Math.min(240, Number(document.getElementById('gridGapSize')?.value || 0)));
                const hLines = gridCustomLines.filter(l => l.type === 'h');
                const vLines = gridCustomLines.filter(l => l.type === 'v');
                if(countEl) countEl.textContent = tr('canvas.gridWillOutput').replace('{n}', (hLines.length + 1) * (vLines.length + 1));
                ctx.save();
                hLines.forEach(l => {
                    const y = l.pos * canvasEl.height;
                    if(gap > 0){
                        drawGuideLine(0, y - gap / 2, canvasEl.width, y - gap / 2);
                        drawGuideLine(0, y + gap / 2, canvasEl.width, y + gap / 2);
                    } else {
                        drawGuideLine(0, y, canvasEl.width, y);
                    }
                });
                vLines.forEach(l => {
                    const x = l.pos * canvasEl.width;
                    if(gap > 0){
                        drawGuideLine(x - gap / 2, 0, x - gap / 2, canvasEl.height);
                        drawGuideLine(x + gap / 2, 0, x + gap / 2, canvasEl.height);
                    } else {
                        drawGuideLine(x, 0, x, canvasEl.height);
                    }
                });
                ctx.restore();
                return;
            }
            // 常规模式
            const {rows, cols, gap} = gridSplitSettings();
            if(countEl) countEl.textContent = tr('canvas.gridWillOutput').replace('{n}', rows * cols);
            ctx.save();
            const scaleX = canvasEl.width;
            const scaleY = canvasEl.height;
            for(let i = 1; i < cols; i++){
                const x = i * scaleX / cols;
                if(gap > 0){
                    drawGuideLine(x - gap / 2, 0, x - gap / 2, scaleY);
                    drawGuideLine(x + gap / 2, 0, x + gap / 2, scaleY);
                } else {
                    drawGuideLine(x, 0, x, scaleY);
                }
            }
            for(let i = 1; i < rows; i++){
                const y = i * scaleY / rows;
                if(gap > 0){
                    drawGuideLine(0, y - gap / 2, scaleX, y - gap / 2);
                    drawGuideLine(0, y + gap / 2, scaleX, y + gap / 2);
                } else {
                    drawGuideLine(0, y, scaleX, y);
                }
            }
            ctx.restore();
        }

        function captureNodeScrolls(nodeEl){
            const scrolls = [];
            const candidates = nodeEl.querySelectorAll('.node-body, .prompt-editor, .prompt-upstream, .prompt-list, .ptpl-preview, .llm-chat-log, .llm-output, .loop-preview, .seedance-slot-grid, .portrait-grid, [style*="overflow"]');
            candidates.forEach(el => {
                if(el.scrollTop > 0 || el.scrollLeft > 0){

        function domPath(root, el){
            const parts = [];
            let cur = el;
            while(cur && cur !== root){
                let seg = cur.tagName.toLowerCase();
                if(cur.id){
                    seg += '#' + CSS.escape(cur.id);
                } else if(cur.className && typeof cur.className === 'string'){
                    const cls = cur.className.split(/\s+/).find(c => c && /^[a-zA-Z]/.test(c) && c.length < 30);
                    if(cls) seg += '.' + CSS.escape(cls);
                }
                const sibs = cur.parentNode ? [...cur.parentNode.children].filter(c => c.tagName === cur.tagName) : [];
                if(sibs.length > 1) seg += ':nth-of-type(' + (sibs.indexOf(cur) + 1) + ')';
                parts.unshift(seg);
                cur = cur.parentNode;
            }
            return parts.join(' > ');

        function restoreNodeScrolls(nodeEl, scrolls){

        const PROMPT_TEMPLATE_LIBRARIES = [
            {id:'composition', url:'/static/system-prompts/templates/composition.json', labelKey:'canvas.promptTemplateComposition'},
            {id:'seedream', url:CORE_PROMPT_TEMPLATE_URL, category:'Seedream', labelKey:'canvas.promptTemplateSeedream'},
            {id:'seedance', url:CORE_PROMPT_TEMPLATE_URL, category:'Seedance', labelKey:'canvas.promptTemplateSeedance'},
            {id:'gpt-image-2', url:CORE_PROMPT_TEMPLATE_URL, category:'GPT-Image-2', labelKey:'canvas.promptTemplateGptImage2'},
            {id:'nano-banana', url:CORE_PROMPT_TEMPLATE_URL, category:'Nano Banana', labelKey:'canvas.promptTemplateNanoBanana'}
        ];
        const promptTemplateCache = {};
        const promptTemplatePending = {};
        function normalizePromptTemplateLibraryId(libId){
            if(libId === 'core') return 'seedream';
            return libId || 'composition';
        }
        function materializePromptTemplateLibrary(def, json){
            if(!def?.category) return json;
            const presets = Array.isArray(json?.presets)
                ? json.presets.filter(p => p.category === def.category)
                : [];
            return {...json, presets};
        }
        function loadPromptTemplateLibrary(libId){
            libId = normalizePromptTemplateLibraryId(libId);
            if(promptTemplateCache[libId]) return Promise.resolve(promptTemplateCache[libId]);
            if(promptTemplatePending[libId]) return promptTemplatePending[libId];
            const def = PROMPT_TEMPLATE_LIBRARIES.find(l => l.id === libId);
            if(!def) return Promise.reject(new Error(`unknown library: ${libId}`));
            const p = fetch(def.url).then(r => {
                if(!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            }).then(json => {
                promptTemplateCache[libId] = materializePromptTemplateLibrary(def, json);
                delete promptTemplatePending[libId];
                return promptTemplateCache[libId];
            }).catch(err => {
                delete promptTemplatePending[libId];
                throw err;
            });
            promptTemplatePending[libId] = p;
            return p;
        }
        function findPromptTemplatePreset(libJson, presetId){
            if(!libJson || !Array.isArray(libJson.presets)) return null;
            if(!presetId) return libJson.presets[0] || null;
            return libJson.presets.find(p => p.id === presetId) || null;
        }
        function buildPromptTemplatePresetOptions(presets, selectedId){
            return presets.map(p =>
                `<option value="${escapeAttr(p.id)}" ${p.id === selectedId ? 'selected' : ''}>${escapeHtml(p.name || p.id)}</option>`
            ).join('');
        }
        function fillPromptTemplatePlaceholders(text, values){
            if(!text) return '';
            return text.replace(/\[([^\]]+)\]/g, (match, key) => {
                const val = values && values[key];
                if(val == null || String(val).trim() === '') return match;
                return String(val);
            });
        }
        function buildPromptTemplateOutput(node){
            const libId = normalizePromptTemplateLibraryId(node.library);
            const lib = promptTemplateCache[libId];
            const result = {positive:'', negative:'', presetName:''};
            if(!lib){
                loadPromptTemplateLibrary(libId).then(() => refreshNodes([node.id], {geometry:false, force:true})).catch(() => {});
                return result;
            }
            const preset = findPromptTemplatePreset(lib, node.presetId);
            if(!preset) return result;
            result.presetName = preset.name || '';
            const values = node.placeholderValues || {};
            const mode = node.mode || 'positive';
            if(mode === 'positive' || mode === 'both'){
                result.positive = fillPromptTemplatePlaceholders(preset.positive || '', values);
            }
            if(mode === 'negative' || mode === 'both'){
                result.negative = fillPromptTemplatePlaceholders(preset.negative || '', values);
            }
            return result;
        }
        function renderPromptTemplateBody(node){
            const wrap = document.createElement('div');
            wrap.className = 'prompt-template-body';
            const libId = normalizePromptTemplateLibraryId(node.library);
            if(node.library !== libId) node.library = libId;
            const lib = promptTemplateCache[libId];
            if(!lib){
                wrap.innerHTML = `<div class="text-[11px] text-gray-400 py-2">${tr('canvas.promptTemplateLoading')}</div>`;
                loadPromptTemplateLibrary(libId)
                    .then(() => refreshNodes([node.id], {geometry:false, force:true}))
                    .catch(err => {
                        const target = nodesEl.querySelector(`.node[data-id="${CSS.escape(node.id)}"] .prompt-template-body`);
                        if(target) target.innerHTML = `<div class="text-[11px] text-red-300 py-2">${tr('canvas.promptTemplateLoadError')}: ${escapeHtml(String(err.message || err))}</div>`;
                    });
                return wrap;
            }
            const presets = Array.isArray(lib.presets) ? lib.presets : [];
            if(!node.presetId && presets[0]) node.presetId = presets[0].id;
            const preset = findPromptTemplatePreset(lib, node.presetId) || presets[0];
            const placeholders = (preset && Array.isArray(preset.placeholders)) ? preset.placeholders : [];
            const values = node.placeholderValues || (node.placeholderValues = {});
            const mode = node.mode || 'positive';
            const libOptions = PROMPT_TEMPLATE_LIBRARIES.map(l =>
                `<option value="${escapeAttr(l.id)}" ${libId === l.id ? 'selected' : ''}>${escapeHtml(tr(l.labelKey))}</option>`
            ).join('');
            const presetOptions = buildPromptTemplatePresetOptions(presets, preset && preset.id);
            const modes = [
                ['positive', tr('canvas.promptTemplateModePositive')],
                ['negative', tr('canvas.promptTemplateModeNegative')],
                ['both', tr('canvas.promptTemplateModeBoth')]
            ];
            const modeBtns = modes.map(([val, label]) =>
                `<button type="button" class="ptpl-mode-btn ${mode === val ? 'active' : ''}" data-mode="${val}">${escapeHtml(label)}</button>`
            ).join('');
            const placeholdersHtml = placeholders.length
                ? placeholders.map(key => `
                    <label class="ptpl-placeholder">
                        <span class="ptpl-placeholder-key">${escapeHtml(key)}</span>
                        <textarea rows="2" class="ptpl-placeholder-input" data-ph="${escapeAttr(key)}" placeholder="${escapeAttr(key)}">${escapeHtml(values[key] || '')}</textarea>
                    </label>`).join('')
                : `<div class="text-[11px] text-gray-400 py-1">${tr('canvas.promptTemplatePlaceholderEmpty')}</div>`;
            const built = buildPromptTemplateOutput(node);
            const previewSegments = [];
            if(built.positive) previewSegments.push({label:tr('canvas.promptTemplateModePositive'), text:built.positive});
            if(built.negative) previewSegments.push({label:tr('canvas.promptTemplateModeNegative'), text:built.negative, isNegative:true});
            const previewHtml = previewSegments.map(seg => `
                <div class="ptpl-preview-block ${seg.isNegative ? 'negative' : ''}">
                    <div class="ptpl-preview-label">${escapeHtml(seg.label)}</div>
                    <div class="ptpl-preview-text">${escapeHtml(seg.text)}</div>
                </div>`).join('');
            const sceneHtml = preset && preset.scene ? `<div class="ptpl-scene">${escapeHtml(preset.scene)}</div>` : '';
            wrap.innerHTML = `
                <div class="ptpl-row">
                    <label class="ptpl-field">
                        <span class="ptpl-field-label">${escapeHtml(tr('canvas.promptTemplateLibrary'))}</span>
                        <select class="select-lite ptpl-library">${libOptions}</select>
                    </label>
                    <label class="ptpl-field" style="flex:2">
                        <span class="ptpl-field-label">${escapeHtml(tr('canvas.promptTemplatePreset'))}</span>
                        <select class="select-lite ptpl-preset">${presetOptions}</select>
                    </label>
                </div>
                ${sceneHtml}
                <div class="ptpl-mode-row">
                    <span class="ptpl-field-label">${escapeHtml(tr('canvas.promptTemplateMode'))}</span>
                    <div class="ptpl-mode-group">${modeBtns}</div>
                </div>
                <div class="ptpl-section">
                    <div class="ptpl-placeholders">${placeholdersHtml}</div>
                </div>
                <div class="ptpl-section">
                    <div class="ptpl-section-label">${escapeHtml(tr('canvas.promptTemplatePreview'))}</div>
                    <div class="ptpl-preview">${previewHtml || `<div class="text-[11px] text-gray-400">—</div>`}</div>
                </div>
            `;
            const libSelect = wrap.querySelector('.ptpl-library');
            const presetSelect = wrap.querySelector('.ptpl-preset');
            libSelect.onchange = e => {
                const nextLibrary = normalizePromptTemplateLibraryId(e.target.value);
                node.library = nextLibrary;
                node.presetId = '';
                node.placeholderValues = {};
                loadPromptTemplateLibrary(nextLibrary)
                    .then(libJson => {
                        if(normalizePromptTemplateLibraryId(node.library) !== nextLibrary) return;
                        const firstPreset = Array.isArray(libJson.presets) ? libJson.presets[0] : null;
                        if(!node.presetId && firstPreset) node.presetId = firstPreset.id;
                        refreshNodes([node.id], {geometry:false, force:true});
                        syncGeneratorInputs();
                        refreshGeneratorInputViews();
                    })
                    .catch(() => {});
                refreshNodes([node.id], {geometry:false, force:true});
                scheduleSave();
                syncGeneratorInputs();
                refreshGeneratorInputViews();
            };
            presetSelect.onchange = e => {
                node.presetId = e.target.value;
                const newPreset = findPromptTemplatePreset(lib, node.presetId);
                const newKeys = new Set((newPreset && newPreset.placeholders) || []);
                Object.keys(node.placeholderValues || {}).forEach(k => { if(!newKeys.has(k)) delete node.placeholderValues[k]; });
                presetSelect.blur();
                refreshNodes([node.id], {geometry:false, force:true});
                scheduleSave();
                syncGeneratorInputs();
                refreshGeneratorInputViews();
            };
            wrap.querySelectorAll('.ptpl-mode-btn').forEach(btn => {
                btn.onclick = e => {
                    e.stopPropagation();
                    node.mode = btn.dataset.mode;
                    refreshNodes([node.id], {geometry:false});
                    scheduleSave();
                    syncGeneratorInputs();
                    refreshGeneratorInputViews();
                };
            });
            wrap.querySelectorAll('.ptpl-placeholder-input').forEach(input => {
                let inputTimer = 0;
                input.oninput = e => {
                    node.placeholderValues[input.dataset.ph] = e.target.value;
                    const preview = wrap.querySelector('.ptpl-preview');
                    if(preview){
                        const fresh = buildPromptTemplateOutput(node);
                        const segs = [];
                        if(fresh.positive) segs.push({label:tr('canvas.promptTemplateModePositive'), text:fresh.positive});
                        if(fresh.negative) segs.push({label:tr('canvas.promptTemplateModeNegative'), text:fresh.negative, isNegative:true});
                        preview.innerHTML = segs.length
                            ? segs.map(seg => `<div class="ptpl-preview-block ${seg.isNegative ? 'negative' : ''}"><div class="ptpl-preview-label">${escapeHtml(seg.label)}</div><div class="ptpl-preview-text">${escapeHtml(seg.text)}</div></div>`).join('')
                            : `<div class="text-[11px] text-gray-400">—</div>`;
                    }
                    scheduleSave();
                    clearTimeout(inputTimer);
                    inputTimer = setTimeout(() => { syncGeneratorInputs(); refreshGeneratorInputViews(); }, 500);
                };
            });
            return wrap;
        }
        function renderLoopBody(node){
            const wrap = document.createElement('div');
            wrap.className = 'loop-body';
            node.count = loopCount(node);
            node.loopStart = Math.max(1, Number(node.loopStart) || 1);
            node.mode = node.mode === 'parallel' ? 'parallel' : 'serial';
            node.showPrompt = Boolean(node.showPrompt);
            node.imageInput = Boolean(node.imageInput);
            node.imageBatchSize = Math.max(1, Math.min(100, Number(node.imageBatchSize) || 1));
            const imageInputCount = loopInputImageRefs(node, {index:node.loopStart}).length;
            wrap.innerHTML = `
                <div class="loop-count-row">
                    <div class="loop-count-group">
                        <span class="loop-count-label">${tr('canvas.loopCount')}</span>
                        <input class="loop-count-input" type="number" min="1" max="100" step="1" value="${node.count}">
                    </div>
                    <div class="loop-toggle-row" style="display:flex;gap:6px;align-items:center;">
                        <button class="loop-toggle loop-image-toggle ${node.imageInput ? 'active' : ''}" type="button"><i data-lucide="image" class="w-3.5 h-3.5"></i>${tr('canvas.loopImageToggle')}</button>
                        <button class="loop-toggle loop-prompt-toggle ${node.showPrompt ? 'active' : ''}" type="button"><i data-lucide="text-cursor-input" class="w-3.5 h-3.5"></i>${tr('canvas.loopPromptToggle')}</button>
                    </div>
                    <div class="seg loop-mode">
                        <button type="button" data-loop-mode="serial" class="${node.mode !== 'parallel' ? 'active' : ''}">${tr('canvas.loopSerial')}</button>

                    </div>
                </div>
                ${node.imageInput ? `<div class="loop-image-panel">
                    <div class="loop-image-row">
                        <span class="loop-count-label">${tr('canvas.loopImageStart')}</span>
                        <input class="loop-count-input loop-image-start-input" type="number" min="1" max="9999" step="1" value="${node.loopStart}">
                        <span class="loop-count-label">${tr('canvas.loopBatchSize')}</span>
                        <input class="loop-count-input loop-batch-input" type="number" min="1" max="100" step="1" value="${node.imageBatchSize}">
                    </div>
                    <div class="loop-image-hint">${imageInputCount ? trf('canvas.loopImageWillOutput', {n:imageInputCount}) : tr('canvas.loopImageEmpty')}</div>
                </div>` : ''}
                ${node.showPrompt ? `<div class="loop-prompt-panel">
                    <div class="loop-field">
                        <textarea class="loop-variable" placeholder="${tr('canvas.loopVariablePlaceholder')}">${escapeHtml(node.variablePrompt || '')}</textarea>
                        <div class="loop-token-row">
                            <button class="loop-token-btn" type="button" data-token="《计数》">${tr('canvas.counterToken')}</button>
                            <button class="loop-token-btn" type="button" data-token="《总数》">${tr('canvas.totalToken')}</button>
                            <button class="loop-token-btn" type="button" data-token="《进度》">${tr('canvas.progressToken')}</button>
                        </div>
                    </div>
                    <div class="loop-start-row">
                        <span class="loop-count-label">${tr('canvas.loopStart')}</span>
                        <input class="loop-count-input loop-start-input" type="number" min="1" max="9999" step="1" value="${node.loopStart}">
                    </div>
                </div>` : ''}
            `;
            const countInput = wrap.querySelector('.loop-count-input');
            const variable = wrap.querySelector('.loop-variable');
            const toggle = wrap.querySelector('.loop-prompt-toggle');
            const imageToggle = wrap.querySelector('.loop-image-toggle');
            const imageStartInput = wrap.querySelector('.loop-image-start-input');
            const batchInput = wrap.querySelector('.loop-batch-input');
            const refreshImageHint = () => {
                const hint = wrap.querySelector('.loop-image-hint');
                if(!hint) return;
                const count = loopInputImageRefs(node, {index:node.loopStart}).length;
                hint.textContent = count ? trf('canvas.loopImageWillOutput', {n:count}) : tr('canvas.loopImageEmpty');
            };
            if(imageStartInput){
                imageStartInput.onmousedown = e => e.stopPropagation();
                imageStartInput.onclick = e => e.stopPropagation();
                imageStartInput.oninput = e => {
                    node.loopStart = Math.max(1, Number(e.target.value) || 1);
                    refreshImageHint();
                    scheduleSave();
                };
            }
            if(batchInput){
                batchInput.onmousedown = e => e.stopPropagation();
                batchInput.onclick = e => e.stopPropagation();
                batchInput.oninput = e => {
                    node.imageBatchSize = Math.max(1, Math.min(100, Number(e.target.value) || 1));
                    e.target.value = node.imageBatchSize;
                    refreshImageHint();
                    scheduleSave();
                };
            }
            if(imageToggle){
                imageToggle.onclick = e => {
                    e.stopPropagation();
                    node.imageInput = !node.imageInput;
                    if(node.imageInput){
                        node.imageBatchSize = Math.max(1, Math.min(100, Number(node.imageBatchSize) || 1));
                    }
                    autoSizeLoopNode(node, node.imageInput || node.showPrompt);
                    render();
                    scheduleSave();
                    syncGeneratorInputs();
                    refreshGeneratorInputViews();
                };
            }
            wrap.querySelectorAll('textarea').forEach(textarea => {
                textarea.onwheel = e => e.stopPropagation();
            });
            const refreshPreview = () => {
                const preview = wrap.querySelector('.loop-preview:last-child');
                if(preview) preview.textContent = renderLoopPrompt(node, {index:1, total:loopCount(node)}) || tr('canvas.noPromptMeta');
            };
            countInput.oninput = e => {
                node.count = loopCount({count:e.target.value});
                e.target.value = node.count;
                refreshPreview();
                scheduleSave();
            };
            const startInput = wrap.querySelector('.loop-start-input');
            if(startInput){
                startInput.onmousedown = e => e.stopPropagation();
                startInput.onclick = e => e.stopPropagation();
                startInput.oninput = e => {
                    node.loopStart = Math.max(1, Number(e.target.value) || 1);
                    scheduleSave();
                };
            }
            wrap.querySelectorAll('[data-loop-mode]').forEach(btn => {
                btn.onclick = e => {
                    e.stopPropagation();
                    node.mode = btn.dataset.loopMode === 'parallel' ? 'parallel' : 'serial';
                    render();
                    scheduleSave();
                };
            });
            toggle.onclick = e => {
                e.stopPropagation();
                const opening = !node.showPrompt;
                node.showPrompt = opening;
                autoSizeLoopNode(node, opening);
                render();
                scheduleSave();
                syncGeneratorInputs();
                refreshGeneratorInputViews();
            };
            if(variable) variable.oninput = e => {
                    node.variablePrompt = e.target.value;
                    refreshPreview();
                    scheduleSave();
                    syncGeneratorInputs();
                    refreshGeneratorInputViews();
                };
            wrap.querySelectorAll('[data-token]').forEach(btn => {
                btn.onclick = e => {
                    e.stopPropagation();
                    const token = btn.dataset.token || '';
                    if(!variable) return;
                    const start = variable.selectionStart ?? variable.value.length;
                    const end = variable.selectionEnd ?? start;
                    const pill = `[${loopTokenLabel(token)}]`;
                    variable.value = `${variable.value.slice(0, start)}${pill}${variable.value.slice(end)}`;
                    variable.selectionStart = variable.selectionEnd = start + pill.length;
                    node.variablePrompt = variable.value;
                    variable.focus();
                    refreshPreview();
                    scheduleSave();
                    syncGeneratorInputs();
                    refreshGeneratorInputViews();
                };
            });
            return wrap;
        }
        function renderLLMBody(node){
            const wrap = document.createElement('div');
            wrap.className = 'llm-body';
            const mode = node.mode || 'node';
            node.llmProvider = resolveChatProviderId(node.llmProvider || 'comfly');
            const llmProv = node.llmProvider;
            if(llmProv === 'modelscope') node.model = node.llmMsModel || node.model;
            if(!providerChatModels(llmProv).includes(node.model)) node.model = providerChatModels(llmProv)[0] || node.model;
            const modelOpts = chatModelOptions(node.model, llmProv);
            const imgs = llmInputImages(node);
            const imgBadge = imgs.length ? `<div style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;background:rgba(16,185,129,.12);color:#047857;font-size:10.5px;font-weight:700;width:fit-content;line-height:1.4"><i data-lucide="image" class="w-3 h-3"></i>已连接 ${imgs.length} 张图片 · 需选 VL 视觉模型（如 Qwen2.5-VL）</div>` : '';
            node.showSystem = Boolean(node.showSystem);
            wrap.innerHTML = `
                <div class="llm-row">
                    <select class="select-lite llm-provider-select" style="flex:1">${chatProviderOptions(llmProv)}</select>
                    <select class="select-lite llm-model">${modelOpts}</select>
                    <div class="llm-mode"><button data-mode="node">${tr('canvas.nodeMode')}</button><button data-mode="chat">${tr('canvas.chatMode')}</button></div>
                    <button class="llm-sys-toggle ${node.showSystem ? 'active' : ''}" type="button">System</button>
                </div>
                ${imgBadge}
                ${node.showSystem ? `<textarea class="llm-system" placeholder="${tr('canvas.systemPrompt')}">${escapeHtml(node.systemPrompt || '')}</textarea>` : ''}
                <div class="llm-node-pane"></div>
                <div class="llm-chat-pane"></div>
            `;
            const providerSelect = wrap.querySelector('.llm-provider-select');
            const modelSelect = wrap.querySelector('.llm-model');
            providerSelect.value = llmProv;
            modelSelect.value = resolveChatModel(node.model, llmProv);
            [providerSelect, modelSelect].forEach(input => {
                input.onmousedown = e => e.stopPropagation();
                input.onclick = e => e.stopPropagation();
            });
            providerSelect.onchange = e => {
                e.stopPropagation();
                if(e.target.value === '__manage__'){
                    e.target.value = node.llmProvider;
                    openModelManager('chat', node.llmProvider);
                    return;
                }
                node.llmProvider = e.target.value;
                const models = providerChatModels(node.llmProvider);
                node.model = models[0] || '';
                if(node.llmProvider === 'modelscope') node.llmMsModel = node.model;
                render();
                scheduleSave();
            };
            modelSelect.onchange = e => {
                e.stopPropagation();
                if(e.target.value === '__manage__'){
                    e.target.value = resolveChatModel(node.model, node.llmProvider);
                    openModelManager('chat', node.llmProvider);
                    return;
                }
                node.model = e.target.value;
                if((node.llmProvider||'comfly') === 'modelscope') node.llmMsModel = e.target.value;
                scheduleSave();
            };
            wrap.querySelector('.llm-sys-toggle').onclick = e => { e.stopPropagation(); node.showSystem = !node.showSystem; render(); scheduleSave(); };
            const sysEl = wrap.querySelector('.llm-system');
            if(sysEl){ sysEl.oninput = e => { node.systemPrompt = e.target.value; scheduleSave(); }; bindScrollableText(sysEl); }
            wrap.querySelectorAll('[data-mode]').forEach(btn => {
                btn.classList.toggle('active', mode === btn.dataset.mode);
                btn.onclick = e => { e.stopPropagation(); node.mode = btn.dataset.mode; render(); scheduleSave(); };
            });
            const nodePane = wrap.querySelector('.llm-node-pane');
            const chatPane = wrap.querySelector('.llm-chat-pane');
            if(mode === 'chat'){
                nodePane.style.display = 'none';
                renderLLMChatPane(chatPane, node);
            } else {
                chatPane.style.display = 'none';
                renderLLMNodePane(nodePane, node);
            }
            return wrap;
        }

                </div>
                <div class="gen-run-row mt-2">
                    <button class="llm-run ${node.running ? 'running' : ''}" ${node.running ? 'disabled' : ''}><i data-lucide="play" class="w-4 h-4"></i>${node.running ? tr('canvas.running') : 'Run LLM'}</button>

        function bindScrollableText(el){
            if(!el) return;
            const stop = e => e.stopPropagation();
            const beginSelection = e => {
                e.stopPropagation();
                textSelectionGuard = {
                    el,
                    scrollTop:el.scrollTop || 0,
                    scrollLeft:el.scrollLeft || 0,
                    clientY:e.clientY,
                    wheelUntil:0,
                    active:true
                };
            };
            el.addEventListener('mousedown', beginSelection);
            el.addEventListener('mousemove', e => {
                e.stopPropagation();
                if(textSelectionGuard?.el === el) textSelectionGuard.clientY = e.clientY;
            });
            el.addEventListener('mouseup', e => {
                e.stopPropagation();
                if(textSelectionGuard?.el === el) textSelectionGuard.active = false;
            });
            el.addEventListener('mouseleave', e => {
                e.stopPropagation();
                if(textSelectionGuard?.el === el) {
                    el.scrollTop = textSelectionGuard.scrollTop;
                    el.scrollLeft = textSelectionGuard.scrollLeft;
                }
            });
            el.addEventListener('scroll', () => {
                const guard = textSelectionGuard;
                if(!guard || guard.el !== el || !guard.active || Date.now() < guard.wheelUntil) {
                    if(guard?.el === el) {
                        guard.scrollTop = el.scrollTop || 0;
                        guard.scrollLeft = el.scrollLeft || 0;
                    }
                    return;
                }
                const nextTop = el.scrollTop || 0;
                const prevTop = guard.scrollTop || 0;
                const rect = el.getBoundingClientRect();
                const pointerBelow = Number.isFinite(guard.clientY) && guard.clientY > rect.bottom - 10;
                const pointerAbove = Number.isFinite(guard.clientY) && guard.clientY < rect.top + 10;
                const jumpedToTop = prevTop > Math.max(80, el.clientHeight * 0.45) && nextTop < 4 && !pointerAbove;
                const wrongDirectionJump = pointerBelow && nextTop < prevTop - Math.max(40, el.clientHeight * 0.25);
                if(jumpedToTop || wrongDirectionJump) {
                    requestAnimationFrame(() => {
                        if(textSelectionGuard?.el === el && textSelectionGuard.active) {
                            el.scrollTop = prevTop;
                            el.scrollLeft = guard.scrollLeft || 0;
                        }
                    });
                    return;
                }
                guard.scrollTop = nextTop;
                guard.scrollLeft = el.scrollLeft || 0;
            }, {passive:true});
            el.addEventListener('click', stop);
            el.addEventListener('dblclick', stop);
            el.addEventListener('wheel', e => {
                e.stopPropagation();
                if(textSelectionGuard?.el === el) textSelectionGuard.wheelUntil = Date.now() + 180;
            }, {passive:true});
        }

        function updateComfyField(node, input, event){

                const type = input.dataset.comfyType || field?.type || 'text';
                if(type === 'boolean') node.comfyParams[paramId] = !Boolean(node.comfyParams[paramId] ?? field?.default ?? false);
                else if(type === 'number' || type === 'slider') node.comfyParams[paramId] = Number(input.value) || 0;

        function orderedSources(gen, sources){

        function reorderInput(gen, movedId, targetId){

            const promptIds = (gen.inputs || []).filter(id => !imageIds.includes(id));
            const ids = (gen.inputs || []).filter(id => imageIds.includes(id));
            const from = ids.indexOf(movedId), to = ids.indexOf(targetId);
            if(from < 0 || to < 0) return;
            ids.splice(to, 0, ids.splice(from, 1)[0]);
            gen.inputs = [...ids, ...promptIds];

        async function runDedicatedImageNode(nodeId, endpoint, opts={}){

            const {prompt, refs} = dedicatedPromptAndRefs(node);
            if(!prompt && !refs.length){ showErrorModal(tr('canvas.needPromptOrImage')); return; }
            const count = Math.max(1, Math.min(8, Number(node.count || 1)));
            const out = outputForNode(node);
            const pendingIds = Array.from({length:count}, () => uid('p'));
            const run = runSnapshot(node, prompt || 'Edit the reference images.', refs);
            out._pending = [...(out._pending || []), ...pendingIds.map(id => makePending(id, run))];
            if(!opts.cascade){ node.running = true; render(); }
            scheduleSave();

                    model: node.model,
                    size: dedicatedSize(node),
                    quality: node.quality || 'auto',
                    count,
                    seed: node.seed === '' || node.seed == null ? null : Number(node.seed),
                    watermark: Boolean(node.watermark),
                    reference_images: refs
                };
                const result = await fetch(endpoint, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify(payload)
                }).then(async r => { if(!r.ok) throw new Error(await responseErrorMessage(r, tr('canvas.generationFailed'))); return r.json(); });
                const images = result.images || [];
                const metas = collectRunMetas(out, pendingIds);
                run.request = requestMetaFromResult(result);
                out._pending = (out._pending || []).filter(p => !pendingIds.includes(p.id));
                appendOutputImages(out, images, refs[0], metas);
                {
                    const seen = new Set([...(node.lastOutputs || [])].filter(Boolean));
                    node.lastOutputs = [...(node.lastOutputs || []).filter(Boolean), ...images.filter(u => u && !seen.has(u))].slice(-24);
                }
                addGenerationLog({run, outputs:images, runMs:Math.max(...metas.map(m => m.runMs || 0), 0)});
                node.runStatus = 'done'; node.runError = '';
                render();
                scheduleSave();
            } catch(err) {
                const metas = collectRunMetas(out, pendingIds);
                addGenerationLog({run, outputs:[], runMs:Math.max(...metas.map(m => m.runMs || 0), 0), error:err.message || String(err)});

                scheduleSave();
                if(opts.cascade) throw err;
                showErrorModal(err.message || tr('canvas.generationFailed'), tr('canvas.apiFailed'));
            } finally {
                node.running = false;

            }
        }

        function seedanceInitialPollDelay(node){
            return isSeedance20Model(node?.model) ? 45 * 1000 : 8 * 1000;
        }
        function seedanceHasActiveRun(node){
            const activeRun = seedanceRunById(node, node?._seedanceActiveRunId);
            if(seedanceNodeHasCompletedVideoResult(node, activeRun) || (!activeRun && seedanceNodeHasCompletedVideoResult(node))) return false;
            const hasActiveRecord = Array.isArray(node?.seedanceRuns) && node.seedanceRuns.some(run => {
                const status = run?.status || '';
                return (run?.taskIds?.length || ['submitting', 'needs_recovery'].includes(status)) && !['done', 'failed', 'missing'].includes(status);
            });
            return Boolean(node?.running || node?.checking || node?.taskIds?.length || node?._seedancePendingId || hasActiveRecord);
        }
        function scheduleSeedancePoll(nodeId, delay=null){
            if(seedancePollTimers.has(nodeId)) return;
            const node = nodes.find(n => n.id === nodeId);
            if(!node?.taskIds?.length) return;
            const activeRun = seedanceRunById(node, node._seedanceActiveRunId);
            if(seedanceAutoPollPaused(node, activeRun)) return;
            if(seedanceNodeHasCompletedVideoResult(node, activeRun) || (!activeRun && seedanceNodeHasCompletedVideoResult(node))){
                clearSeedancePollingState(node, activeRun);
                refreshNodes([nodeId]);
                scheduleSave();
                return;
            }
            if(!node._seedancePollStart) node._seedancePollStart = Date.now();
            if(Date.now() - node._seedancePollStart > SEEDANCE_POLL_MAX_MS){
                node.runStatus = 'submitted';
                node.runError = node.runError || 'Seedance 自动轮询已暂停，请用 Check 按钮手动查询。';
                node._seedancePollStart = 0;
                refreshNodes([nodeId]);
                scheduleSave();
                return;
            }
            const timer = setTimeout(() => {
                seedancePollTimers.delete(nodeId);
                const cur = nodes.find(n => n.id === nodeId);
                const curRun = seedanceRunById(cur, cur?._seedanceActiveRunId);
                if(seedanceAutoPollPaused(cur, curRun)) return;
                if(cur && (seedanceNodeHasCompletedVideoResult(cur, curRun) || (!curRun && seedanceNodeHasCompletedVideoResult(cur)))){
                    clearSeedancePollingState(cur, curRun);
                    refreshNodes([nodeId]);
                    scheduleSave();
                    return;
                }
                if(cur?.taskIds?.length) checkSeedanceNode(nodeId, {auto:true});
            }, delay ?? seedancePollInterval(node));
            seedancePollTimers.set(nodeId, timer);
        }
        async function findSeedanceTaskCandidates(nodeId, runId){
            const node = nodes.find(n => n.id === nodeId);
            const run = seedanceRunById(node, runId);
            if(!seedanceCanFindTask(node, run)) return;
            run.finding = true;
            run.findingStartedAt = Date.now();
            run.findSearched = true;
            refreshNodes([nodeId]);
            try {
                const ledger = await seedanceFetchJson('/api/nodes/seedance/status', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({task_ids:[], run_id:run.runId})
                }).catch(err => ({status:'missing', error:err.message || String(err)}));
                if(ledger.task_ids?.length){
                    run.taskIds = ledger.task_ids;
                    run.status = ledger.status === 'missing' ? 'submitted' : (ledger.status || 'submitted');
                    run.recoveryCandidates = [];
                    run.findError = '';
                    if(run.runId === node._seedanceActiveRunId || !node.taskIds?.length){
                        node.taskIds = run.taskIds;
                        node.runStatus = run.status === 'succeeded' ? 'done' : 'submitted';
                        node.runError = '';
                        node._seedanceActiveRunId = run.runId;
                        node._seedancePollStart = Date.now();
                        scheduleSeedancePoll(node.id, seedanceInitialPollDelay(node));
                    }
                    return;
                }
                const result = await seedanceFetchJson('/api/nodes/seedance/tasks', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        run_id:run.runId,
                        model:run.model || node.model,
                        status:'all',
                        page_size:10,
                        submitted_after:Math.max(0, Number(run.submittedAt || 0) / 1000 - 10 * 60),
                        known_task_ids:seedanceKnownTaskIds()
                    })
                });
                const known = new Set(seedanceKnownTaskIds());
                run.recoveryCandidates = (result.tasks || []).filter(task => {
                    const taskId = seedanceCandidateTaskId(task);
                    return taskId && !known.has(taskId);
                }).slice(0, 8);
                run.findError = '';
            } catch(err) {
                run.findError = err.message || String(err);
                showErrorModal(run.findError);
            } finally {
                run.finding = false;
                run.findingStartedAt = 0;
                refreshNodes([nodeId]);
                scheduleSave();
            }
        }
        async function bindSeedanceTaskCandidate(nodeId, runId, taskId){
            const node = nodes.find(n => n.id === nodeId);
            const run = seedanceRunById(node, runId);
            if(!node || !run || !taskId || run.taskIds?.length || run.claiming) return;

                        node_id:node.id,
                        task_id:taskId,
                        model:run.model || node.model,
                        input_signature:run.inputSignature || ''
                    })
                });
                run.taskIds = result.task_ids?.length ? result.task_ids : [taskId];
                run.status = 'submitted';
                run.claimedAt = Date.now();
                run.recoveryCandidates = [];
                run.findError = '';
                if(run.runId === node._seedanceActiveRunId || !node.taskIds?.length){
                    node.taskIds = run.taskIds;
                    node.runStatus = 'submitted';
                    node.runError = '';
                    node._seedanceActiveRunId = run.runId;
                    node._seedancePollStart = Date.now();
                    scheduleSeedancePoll(node.id, seedanceInitialPollDelay(node));
                }

                scheduleSave();
            } catch(err) {
                showErrorModal(err.message || tr('canvas.seedanceTaskBindFailed'));
