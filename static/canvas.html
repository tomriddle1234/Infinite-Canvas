<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>无限画布</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/static/theme.js?v=20260509-global-theme-output-drag"></script>
    <script src="/static/i18n.js?v=20260515-editor-zoom-undo"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap');
        :root { --ease:cubic-bezier(.4,0,.2,1); --page:#f8fafc; --grid:#d9e1ea; --panel:rgba(255,255,255,.92); --card:rgba(255,255,255,.96); --card-solid:#fff; --soft:#f8fafc; --soft-2:#f1f5f9; --line:#e8edf3; --line-2:#cbd5e1; --text:#111827; --muted:#64748b; --faint:#94a3b8; --shadow:rgba(15,23,42,.08); --strong:#111827; --strong-text:#fff; }
        .theme-dark { --page:#0b1020; --grid:rgba(148,163,184,.16); --panel:rgba(17,24,39,.9); --card:rgba(15,23,42,.96); --card-solid:#111827; --soft:#1e293b; --soft-2:#263449; --line:#334155; --line-2:#64748b; --text:#f8fafc; --muted:#cbd5e1; --faint:#94a3b8; --shadow:rgba(0,0,0,.28); --strong:#f8fafc; --strong-text:#0f172a; }
        * { box-sizing:border-box; }
        body { margin:0; height:100vh; overflow:hidden; background:var(--page); color:var(--text); font-family:'Inter',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
        .shell { position:relative; height:100vh; overflow:hidden; }
        .topbar { position:absolute; top:22px; left:24px; right:24px; z-index:30; display:flex; align-items:flex-start; justify-content:space-between; pointer-events:none; }
        .panel { pointer-events:auto; background:var(--panel); border:1px solid var(--line); border-radius:24px; box-shadow:0 16px 44px var(--shadow); backdrop-filter:blur(16px); }
        .library { width:310px; max-height:calc(100vh - 44px); padding:14px; display:flex; flex-direction:column; gap:12px; }
        .canvas-nav { width:max-content; max-width:min(360px, calc(100vw - 48px)); padding:8px 10px 8px 8px; display:flex; align-items:center; gap:8px; }
        .canvas-nav-meta { min-width:0; display:flex; flex-direction:column; gap:2px; }
        .current-canvas-title { max-width:260px; color:var(--text); font-size:12px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .current-canvas-time { max-width:260px; color:var(--faint); font-size:10px; font-weight:400; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .canvas-list { display:flex; flex-direction:column; gap:8px; overflow:auto; max-height:360px; }
        .canvas-item { position:relative; width:100%; aspect-ratio:1/1; text-align:left; border:1px solid #edf0f3; background:#fff; border-radius:14px; padding:0; transition:all .18s var(--ease); cursor:pointer; }
        .canvas-item:hover { border-color:#cbd5e1; box-shadow:0 1px 3px rgba(15,23,42,.06); }
        .canvas-item.active { background:#0f172a; border-color:#0f172a; box-shadow:0 1px 3px rgba(15,23,42,.15); }
        .canvas-item.active .canvas-card-title { color:#fff; }
        .canvas-open { width:100%; height:100%; border-radius:14px; padding:10px 12px; text-align:left; display:flex; flex-direction:column; gap:8px; background:transparent; }
        .canvas-card-icon-row { display:flex; align-items:center; justify-content:space-between; gap:6px; }
        .canvas-card-title { flex:1; font-size:13.5px; line-height:1.3; font-weight:750; letter-spacing:-.01em; color:#111827; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; word-break:break-word; }
        .canvas-card-title-input { flex:1; font-size:13.5px; line-height:1.3; font-weight:750; letter-spacing:-.01em; color:#111827; background:#fff; border:1px solid #cbd5e1; border-radius:6px; padding:4px 6px; outline:none; width:100%; }
        .canvas-item.active .canvas-card-title-input { color:#0f172a; }
        .canvas-card-meta { margin-top:auto; display:inline-flex; align-items:center; gap:4px; padding:2px 7px; border-radius:999px; background:#f8fafc; border:1px solid #edf2f7; align-self:flex-start; }
        .canvas-item.active .canvas-card-meta { background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.08); }
        .canvas-card-meta-dot { width:3px; height:3px; border-radius:50%; background:#94a3b8; flex:0 0 auto; }
        .canvas-card-time { font-size:9px; line-height:1.2; font-weight:600; color:#64748b; letter-spacing:.04em; text-transform:uppercase; }
        .canvas-item.active .canvas-card-time { color:rgba(255,255,255,.62); }
        .canvas-delete-confirm { position:absolute; inset:0; z-index:4; display:flex; align-items:center; justify-content:center; padding:12px; background:rgba(15,23,42,.18); backdrop-filter:blur(4px); }
        .canvas-delete-box { width:100%; padding:12px; border-radius:16px; background:#111827; box-shadow:0 16px 36px rgba(15,23,42,.22); text-align:center; }
        .canvas-delete-title { color:#fff; font-size:12px; font-weight:800; line-height:1.35; }
        .canvas-delete-actions { display:flex; gap:6px; margin-top:10px; }
        .canvas-confirm-btn,.canvas-cancel-btn { height:28px; flex:1; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; }
        .canvas-confirm-btn { background:#fff; color:#111827; }
        .canvas-cancel-btn { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.16); }
        .canvas-preview-mark { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:#f8fafc; color:#475569; border:1px solid #edf2f7; font-size:16px; cursor:pointer; transition:all .15s var(--ease); flex:0 0 auto; }
        .canvas-preview-mark:hover { background:#fff; border-color:#cbd5e1; color:#111827; }
        .canvas-item.active .canvas-preview-mark { background:rgba(255,255,255,.08); color:#fff; border-color:rgba(255,255,255,.12); }
        .emoji-picker { position:absolute; left:8px; top:48px; z-index:20; width:170px; padding:8px; border-radius:12px; background:#111827; box-shadow:0 20px 44px rgba(15,23,42,.24); display:grid; grid-template-columns:repeat(6, 1fr); gap:4px; }
        .emoji-option { width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.65); background:transparent; transition:all .15s var(--ease); padding:0; }
        .emoji-option:hover { background:rgba(255,255,255,.14); color:#fff; }
        .canvas-card-edit { position:absolute; right:40px; top:8px; width:26px; height:26px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#94a3b8; background:rgba(255,255,255,.92); border:1px solid #e8edf3; z-index:2; opacity:0; transition:all .14s var(--ease); }
        .canvas-item:hover .canvas-card-edit { opacity:1; }
        .canvas-card-edit:hover { color:#0f172a; border-color:#cbd5e1; background:#fff; }
        .canvas-item.active .canvas-card-edit { background:rgba(255,255,255,.14); color:#fff; border-color:rgba(255,255,255,.18); opacity:1; }
        .canvas-item.active .canvas-card-edit:hover { background:rgba(255,255,255,.22); }
        .canvas-delete { position:absolute; right:8px; top:8px; width:26px; height:26px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#94a3b8; background:rgba(255,255,255,.92); border:1px solid #e8edf3; z-index:2; opacity:0; transition:all .14s var(--ease); }
        .canvas-item:hover .canvas-delete { opacity:1; }
        .canvas-delete:hover { background:#fee2e2; color:#dc2626; border-color:#fecaca; }
        .canvas-restore:hover { background:#ecfdf5; color:#059669; border-color:#a7f3d0; }
        .canvas-item.active .canvas-delete { background:rgba(255,255,255,.14); color:#fff; border-color:rgba(255,255,255,.18); opacity:1; }
        .canvas-item.active .canvas-delete:hover { background:rgba(248,113,113,.22); color:#fecaca; }
        .toolbar { padding:10px; display:flex; gap:8px; align-items:center; }
        .tool-btn { height:38px; min-width:38px; padding:0 12px; border-radius:999px; display:flex; align-items:center; justify-content:center; gap:7px; color:var(--muted); background:var(--card-solid); border:1px solid var(--line); font-size:11px; font-weight:700; transition:all .2s var(--ease); pointer-events:auto; }
        .tool-btn:hover { background:var(--soft-2); color:var(--text); }
        .theme-toggle.active { background:var(--strong); color:var(--strong-text); border-color:var(--strong); }
        .board { position:absolute; inset:0; cursor:grab; background-color:var(--page); background-image:radial-gradient(var(--grid) 1px, transparent 1px); background-size:24px 24px; }
        body.canvas-knife .board,
        body.canvas-knife .node,
        body.canvas-knife .link-hit { cursor:crosshair !important; }
        body.canvas-knife .node { outline:1px dashed rgba(220,38,38,.45); outline-offset:4px; }
        .world { position:absolute; left:0; top:0; width:6000px; height:4000px; transform-origin:0 0; }
        .links { position:absolute; inset:0; width:6000px; height:4000px; overflow:visible; pointer-events:none; z-index:1; }
        .link { stroke:var(--faint); stroke-width:2.5; fill:none; opacity:.82; pointer-events:none; }
        .link.temp { stroke:var(--strong); stroke-dasharray:6 6; }
        .link.knife-trail { stroke:#ef4444; stroke-width:2.4; stroke-dasharray:7 6; opacity:.88; filter:drop-shadow(0 0 6px rgba(239,68,68,.35)); }
        .link-hit { stroke:transparent; stroke-width:18; fill:none; pointer-events:stroke; }
        .link-controls { position:absolute; inset:0; width:6000px; height:4000px; pointer-events:none; z-index:3; }
        .link-delete { position:absolute; width:22px; height:22px; border-radius:999px; display:flex; align-items:center; justify-content:center; transform:translate(-50%,-50%); color:#64748b; background:rgba(255,255,255,.94); border:1px solid #e2e8f0; box-shadow:0 8px 20px rgba(15,23,42,.12); opacity:0; pointer-events:none; transition:opacity .14s var(--ease), color .14s var(--ease), border-color .14s var(--ease), background .14s var(--ease); }
        .link-delete.visible,.link-delete.hover { opacity:1; pointer-events:auto; }
        .link-delete:hover { color:#dc2626; border-color:#fecaca; background:#fff5f5; }
        .node { position:absolute; min-width:220px; min-height:96px; border:1px solid var(--line); border-radius:22px; background:var(--card); box-shadow:0 16px 42px var(--shadow); overflow:visible; user-select:none; z-index:2; }
        .node::before { content:""; position:absolute; inset:0; border-radius:inherit; background:var(--card); pointer-events:none; z-index:-1; overflow:hidden; }
        .node.sized { display:flex; flex-direction:column; }
        .node.selected { outline:2px solid var(--strong); outline-offset:2px; }
        .node-head { height:42px; flex:0 0 42px; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:0 12px; border-bottom:1px solid var(--line); border-radius:21px 21px 0 0; overflow:hidden; cursor:move; }
        .node-title { font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
        /* 一键运行级联状态徽章 */
        .node-run-status { display:inline-flex; align-items:center; gap:4px; padding:2px 7px; border-radius:6px; font-size:10px; font-weight:800; letter-spacing:.04em; }
        .node-run-status.queued { background:#e5e7eb; color:#6b7280; }
        .node-run-status.running { background:#dbeafe; color:#1d4ed8; }
        .node-run-status.done { display:none; }
        .node-run-status.failed { background:#fee2e2; color:#dc2626; }
        body.theme-dark .node-run-status.queued { background:rgba(156,163,175,.22); color:#cbd5e1; }
        body.theme-dark .node-run-status.running { background:rgba(59,130,246,.22); color:#93c5fd; }
        body.theme-dark .node-run-status.done { background:rgba(16,185,129,.22); color:#6ee7b7; }
        body.theme-dark .node-run-status.failed { background:rgba(239,68,68,.22); color:#fca5a5; }
        .node-run-status .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
        .node-run-status.running .dot { animation:nodeStatusPulse 1s ease-in-out infinite; }
        @keyframes nodeStatusPulse { 50% { opacity:.3; } }
        /* 一键运行按钮（与 Run 按钮同款大小，仅在链尾节点显示） */
        .gen-run-row { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
        .gen-run-row .gen-btn,
        .gen-run-row .comfy-run { flex:0 0 40px; margin-top:0; }
        .gen-run-row .llm-run { flex:0 0 36px; margin-top:0; }
        .video-node { width:380px; }
        .node.sized.video-node .generator-body { height:100%; display:flex; flex-direction:column; }
        .node.sized.video-node .input-list { flex:1; min-height:64px; max-height:none; }
        .node.sized.video-node .gen-run-row,
        .node.sized.video-node .gen-btn { margin-top:auto; }
        .node.sized.generator-node .gen-run-row,
        .node.sized.comfy-node .gen-run-row,
        .node.sized.llm-node .gen-run-row { margin-top:auto; }
        .gen-cascade-btn { height:40px; width:100%; flex:0 0 40px; border-radius:16px; background:transparent; border:1.5px solid var(--strong); color:var(--strong); display:flex; align-items:center; justify-content:center; gap:8px; font-size:11px; font-weight:800; letter-spacing:.12em; transition:all .15s ease; }
        .gen-cascade-btn:hover { background:var(--strong); color:var(--strong-text); }
        .gen-cascade-btn:disabled { opacity:.4; cursor:not-allowed; }
        .gen-cascade-stop { border-color:#ef4444; color:#ef4444; }
        .gen-cascade-stop:hover { background:#ef4444; color:#fff; border-color:#ef4444; }
        /* 失败重试栏 */
        .node-retry-bar { display:flex; gap:6px; align-items:center; margin-top:8px; padding:8px 10px; background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.3); border-radius:10px; font-size:11px; }
        body.theme-dark .node-retry-bar { background:rgba(239,68,68,.14); border-color:rgba(239,68,68,.4); }
        .node-retry-msg { flex:1; color:#dc2626; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; user-select:text; cursor:text; }
        body.theme-dark .node-retry-msg { color:#fca5a5; }
        .node-retry-btn, .node-stop-btn { height:24px; padding:0 10px; border-radius:6px; font-size:10.5px; font-weight:800; cursor:pointer; }
        .node-retry-btn { background:#dc2626; color:#fff; }
        .node-retry-btn:hover { background:#b91c1c; }
        .node-stop-btn { background:transparent; border:1px solid var(--line-2); color:var(--muted); }
        .node-stop-btn:hover { color:var(--strong); }
        .node-body { padding:12px; }
        .node.sized .node-body { flex:1; min-height:0; overflow:auto; }
        .resize-handle { position:absolute; right:7px; bottom:7px; width:18px; height:18px; border-radius:8px; cursor:nwse-resize; background:rgba(255,255,255,.86); border:1px solid #e8edf3; display:flex; align-items:center; justify-content:center; color:#94a3b8; opacity:0; transition:all .18s var(--ease); z-index:5; }
        .node:hover .resize-handle,.node.selected .resize-handle { opacity:1; }
        .resize-handle:hover { color:#111827; border-color:#cbd5e1; background:#fff; }
        .resize-handle::before { content:""; width:8px; height:8px; border-right:2px solid currentColor; border-bottom:2px solid currentColor; }
        /* 拖拽/缩放过程中禁止节点内部文本框抢占鼠标事件和文字选中 */
        body.canvas-node-drag * { user-select:none !important; }
        body.canvas-node-drag .node textarea,
        body.canvas-node-drag .node input,
        body.canvas-node-drag .node select,
        body.canvas-node-drag .node .node-body,
        body.canvas-node-drag .node .llm-chat-log { pointer-events:none !important; }
        body.canvas-node-resize { cursor:nwse-resize !important; }
        body.canvas-node-resize * { user-select:none !important; }
        body.canvas-node-resize .node textarea,
        body.canvas-node-resize .node input,
        body.canvas-node-resize .node select,
        body.canvas-node-resize .node .node-body,
        body.canvas-node-resize .node .llm-chat-log { pointer-events:none !important; }
        body.canvas-selecting,
        body.canvas-selecting * { user-select:none !important; }
        body.canvas-selecting .node textarea,
        body.canvas-selecting .node input,
        body.canvas-selecting .node select,
        body.canvas-selecting .node .node-body,
        body.canvas-selecting .node .llm-chat-log,
        body.canvas-selecting .node .llm-bubble { pointer-events:none !important; }
        .image-node { width:260px; }
        .image-node .node-body { min-height:0; }
        .image-node.has-image .node-body { cursor:move; }
        .image-preview-wrap { position:relative; flex:1; min-height:0; display:flex; }
        .image-node img { display:block; width:100%; max-height:260px; object-fit:contain; border-radius:16px; background:#f8fafc; }
        .image-clear-btn { position:absolute; top:7px; right:7px; width:28px; height:28px; border-radius:999px; display:flex; align-items:center; justify-content:center; color:#fff; background:rgba(15,23,42,.72); border:1px solid rgba(255,255,255,.34); box-shadow:0 8px 18px rgba(15,23,42,.2); opacity:0; transform:translateY(-2px); transition:all .15s var(--ease); z-index:3; cursor:pointer; }
        .image-preview-wrap:hover .image-clear-btn,.image-node.selected .image-clear-btn { opacity:1; transform:translateY(0); }
        .image-clear-btn:hover { background:#dc2626; border-color:rgba(255,255,255,.7); }
        .image-preview-wrap.drag-over img { outline:2px solid #111827; outline-offset:2px; background:#fff; }
        .node.sized.image-node .node-body { display:flex; flex-direction:column; gap:8px; }
        .node.sized.image-node img { flex:1; min-height:0; height:100%; max-height:none; }
        .image-caption { flex:0 0 auto; }
        .blank-image { height:190px; border:1px dashed #cbd5e1; border-radius:16px; background:#f8fafc; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:#94a3b8; cursor:pointer; transition:all .2s var(--ease); }
        .node.sized .blank-image { height:100%; min-height:72px; }
        .blank-image:hover,.blank-image.drag-over { border-color:#111827; color:#111827; background:#fff; }
        .prompt-node { width:310px; }
        .prompt-node .node-body { overflow:hidden !important; }
        .prompt-node textarea { width:100%; height:140px; min-height:72px; resize:none; overflow-y:auto; scrollbar-width:thin; border:1px solid #edf2f7; border-radius:16px; outline:none; padding:12px; background:#fbfdff; font-size:13px; line-height:1.6; }
        .prompt-editor { height:100%; display:flex; flex-direction:column; gap:7px; }
        .prompt-counter { flex:0 0 auto; display:flex; justify-content:flex-end; align-items:center; gap:4px; color:#94a3b8; font-size:10.5px; font-weight:800; line-height:1; user-select:none; }
        .prompt-counter.over { color:#dc2626; }
        .node.sized.prompt-node textarea { height:100%; }
        .node.sized.prompt-node textarea { flex:1; height:auto; min-height:0; }
        .loop-node { width:340px; }
        .loop-node .node-body { overflow:hidden !important; min-width:0; }
        .loop-body { display:flex; flex-direction:column; gap:10px; min-width:0; width:100%; max-width:100%; overflow:hidden; }
        .loop-count-row { display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid var(--line-2); border-radius:16px; background:linear-gradient(180deg, var(--card-solid), var(--soft)); justify-content:space-between; }
        .loop-count-group { display:flex; align-items:center; gap:6px; flex:0 0 auto; }
        .loop-count-label { font-size:11px; font-weight:700; color:var(--muted); white-space:nowrap; }
        .loop-count-input { width:48px; height:30px; border:1px solid var(--line-2); border-radius:10px; background:var(--card-solid); color:var(--text); outline:none; padding:0 8px; font-size:13px; font-weight:900; text-align:center; }
        .loop-toggle { height:30px; flex:0 0 auto; border-radius:999px; padding:0 10px; display:flex; align-items:center; gap:6px; border:1px solid var(--line-2); background:var(--card-solid); color:var(--muted); font-size:11px; font-weight:850; white-space:nowrap; }
        .loop-toggle.active { background:var(--strong); color:var(--strong-text); border-color:var(--strong); }
        .loop-mode { flex:0 0 auto; }
        .loop-mode button { min-width:36px; height:24px; padding:0 8px; font-size:10px; }
        .loop-start-row { display:flex; align-items:center; gap:6px; justify-content:flex-end; padding-top:2px; }
        .loop-token-row { display:flex; flex-wrap:wrap; gap:6px; }
        .loop-token-btn { height:28px; border-radius:999px; padding:0 9px; background:var(--soft); color:var(--muted); border:1px solid var(--line-2); font-size:10px; font-weight:850; display:inline-flex; align-items:center; }
        .loop-token-btn:hover { background:var(--strong); color:var(--strong-text); border-color:var(--strong); }
        .loop-prompt-panel { display:flex; flex-direction:column; gap:10px; min-width:0; width:100%; max-width:100%; overflow:hidden; box-sizing:border-box; }
        .loop-field { display:flex; flex-direction:column; gap:5px; min-width:0; width:100%; max-width:100%; overflow:hidden; box-sizing:border-box; }
        .loop-field textarea { display:block; inline-size:100%; max-inline-size:100%; min-inline-size:0; box-sizing:border-box; height:70px; resize:none; border:1px solid var(--line-2); border-radius:14px; outline:none; padding:9px 10px; background:var(--card-solid); color:var(--text); font-size:12px; line-height:1.45; overflow:auto; }
        .node.sized.loop-node .loop-body { height:100%; }
        .node.sized.loop-node .loop-prompt-panel { flex:1; min-height:0; }

        function uniqueModels(list){
            const seen = new Set();
            return list.map(item => String(item || '').trim()).filter(item => {
                if(!item || seen.has(item)) return false;
                seen.add(item);
                return true;
            });
        }
        function defaultApiProviders(){
            return [{id:'comfly', name:'Comfly', base_url:'', enabled:true, image_models:imageModels, chat_models:chatModels, video_models:videoModels.length ? videoModels : DEFAULT_VIDEO_MODELS, has_key:false, key_preview:''}];

            return String(value || '').trim().toLowerCase().replace(/[^a-z0-9_-]/g, '-').replace(/-+/g, '-').slice(0, 40);

            const providers = (apiProviders.length ? apiProviders : defaultApiProviders())

        function apiErrorMessage(data, fallback='请求失败'){
            if(!data) return fallback;

            const detail = data.detail ?? data.error ?? data.message;
            if(typeof detail === 'string') return detail || fallback;
            if(Array.isArray(detail)){
                const messages = detail.map(item => {
                    if(typeof item === 'string') return item;
                    const loc = Array.isArray(item?.loc) ? item.loc.filter(x => x !== 'body').join('.') : '';
                    const msg = item?.msg || item?.message || JSON.stringify(item);
                    return loc ? `${loc}: ${msg}` : msg;
                }).filter(Boolean);
                return messages.join('\n') || fallback;
            }
            if(detail && typeof detail === 'object'){
                return detail.message || detail.msg || JSON.stringify(detail);
            }
            try {
                return JSON.stringify(data);
            } catch(e) {
                return fallback;
            }

        function parseRatioValue(value){
            const raw = String(value || '').trim();
            if(!raw) return null;
            if(raw.includes(':')){
                const [w,h] = raw.split(':').map(Number);
                if(w > 0 && h > 0) return w / h;
            }
            const n = Number(raw);
            return n > 0 ? n : null;
        }
        function parseSizeValue(value){
            const match = String(value || '').trim().match(/^(\d+)\s*[xX*]\s*(\d+)$/);
            return match ? {width:match[1], height:match[2]} : null;
        }
        function apiImageSize(ratioValue, resolutionValue, customRatioValue = '', customSizeValue = ''){
            if(resolutionValue === 'custom') return String(customSizeValue || '').trim();
            const resolutionKey = resolutionValue || '1k';
            if(ratioValue === 'custom'){
                const parsed = parseRatioValue(customRatioValue);
                const longSide = RES_LONG_SIDE[resolutionKey] || 1024;
                if(parsed){
                    const pixelLimit = RES_PIXEL_LIMIT[resolutionKey] || (longSide * longSide);
                    const rawWidth = parsed >= 1 ? longSide : Math.min(longSide * parsed, Math.sqrt(pixelLimit * parsed));
                    const rawHeight = parsed >= 1 ? Math.min(longSide / parsed, Math.sqrt(pixelLimit / parsed)) : longSide;
                    const width = Math.floor(rawWidth / 16) * 16;
                    const height = Math.floor(rawHeight / 16) * 16;
                    return `${Math.max(64, width)}x${Math.max(64, height)}`;
                }
            }
            const ratioKey = ratioValue && SIZE_MAP[ratioValue] ? ratioValue : 'square';
            return SIZE_MAP[ratioKey]?.[resolutionKey] || SIZE_MAP.square[resolutionKey] || SIZE_MAP.square['1k'];
        }

            event.preventDefault();
            event.stopPropagation();
            const stage = event.currentTarget;
            const oldZoom = imageEditZoom;
            const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;
            imageEditZoom = Math.max(0.15, Math.min(6.0, imageEditZoom * factor));
            // 焦点缩放：保持鼠标指向的图片位置不动
            const stageRect = stage.getBoundingClientRect();
            const mx = event.clientX - stageRect.left; // 鼠标在 stage 内偏移
            const my = event.clientY - stageRect.top;
            const contentX = stage.scrollLeft + mx;
            const contentY = stage.scrollTop + my;
            applyImageEditZoom();
            const scale = imageEditZoom / oldZoom;
            stage.scrollLeft = contentX * scale - mx;
            stage.scrollTop = contentY * scale - my;
        }, {passive: false});

        async function getImageDimensions(url){
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve({width: img.naturalWidth, height: img.naturalHeight});

                img.src = url;
            });
        }
        async function urlToBase64(url){
            const res = await fetch(url);
            if(!res.ok) throw new Error('图片读取失败');
            const blob = await res.blob();
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        async function runMsGenNode(nodeId, opts={}){
            const node = nodes.find(n => n.id === nodeId);
            if(!node || (node.running && !opts.cascade)) return;
            const sources = orderedSources(node, generatorSources(node));
            const prompt = sources.map(s => s.prompt).filter(Boolean).join('\n\n');
            const refs = sources.flatMap(s => s.refs || []);
            const modelKey = node.msgenModel || 'zimage';
            const msModel = MS_GEN_MODELS[modelKey] || MS_GEN_MODELS.zimage;
            const msModelId = currentMsModelId(modelKey, node);
            const msLoras = modelscopeLorasForModel(msModelId);
            if(!prompt){ alert(tr('canvas.needPrompt')); return; }
            if(msModel.supportsImage && !refs.length){ alert(tr('canvas.needImage')); return; }
            const count = Math.max(1, Math.min(8, Number(node.count || 1)));
            // 找或创建 output 节点，立即添加 loading 占位
            let out = connections.filter(c => c.from===node.id).map(c => nodes.find(n => n.id===c.to)).find(n => n?.type==='output');
            if(!out){
                out = {id:uid('out'), type:'output', x:node.x+460, y:node.y, images:[]};
                nodes.push(out);
                connections.push({id:uid('c'), from:node.id, to:out.id});
            }
            const pendingIds = Array.from({length:count}, () => uid('p'));
            const run = runSnapshot(node, prompt, refs);
            out._pending = [...(out._pending || []), ...pendingIds.map(id => makePending(id, run))];
            if(!opts.cascade){ node.running = true; render(); setTimeout(() => { node.running = false; render(); }, 2000); }
            try {
                const size = apiImageSize(node.msRatio ?? 'square', node.msResolution || '1k', node.msCustomRatio || '', node.msCustomSize || '');
                const parsed = parseSizeValue(size);
                let width = Number(parsed?.width) || 1024;
                let height = Number(parsed?.height) || 1024;
                if(!parsed && node.msWidth && node.msHeight){
                    width = Number(node.msWidth) || width;
                    height = Number(node.msHeight) || height;
                }
                const imageUrls = [];
                if(msModel.supportsImage || msModel.acceptsImage){
                    for(const ref of refs.slice(0,3)){
                        if(ref.url){
                            try { imageUrls.push(await urlToBase64(ref.url)); }
                            catch(e){ imageUrls.push(ref.url); }
                        }
                    }
                }
                const submitMs = async () => {
                    let apiBody;
                    if(modelKey === 'zimage'){
                        apiBody = { prompt, resolution: `${width}x${height}`, client_id: CLIENT_ID };
                    } else if(modelKey === 'qwen_edit'){
                        apiBody = { prompt, image_urls: imageUrls, resolution: `${width}x${height}`, client_id: CLIENT_ID };
                    } else if(modelKey === 'custom'){
                        apiBody = {
                            prompt,
                            model: node.msCustomModel || modelscopeImageModels()[0] || 'Tongyi-MAI/Z-Image-Turbo',
                            image_urls: imageUrls,
                            width,
                            height,
                            size: `${width}x${height}`,
                            client_id: CLIENT_ID
                        };
                    } else {
                        apiBody = { prompt, model: msModel.modelId, image_urls: imageUrls, width, height, size:`${width}x${height}`, client_id: CLIENT_ID };
                    }
                    if(node.msLoraEnabled){
                        const selected = msLoras.find(lora => String(lora.id || '').trim() === String(node.msLoraId || '').trim()) || msLoras[0];
                        const loraId = String(selected?.id || node.msLoraId || '').trim();
                        if(!loraId) throw new Error(tr('canvas.noLoraBoundError'));
                        apiBody.loras = { [loraId]: Number(node.msLoraStrength ?? selected?.strength ?? 0.8) };
                    }
                    const res = await fetch(msModel.endpoint, {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body:JSON.stringify(apiBody)
                    });
                    if(!res.ok) throw new Error(await responseErrorMessage(res, tr('canvas.msFailed')));
                    return await res.json();
                };
                const results = await Promise.all(Array.from({length:count}, submitMs));
                const metas = collectRunMetas(out, pendingIds);
                const outputUrls = results.map(data => data.url).filter(Boolean);
                run.request = results[0] ? requestMetaFromResult(results[0]) : {};
                out._pending = (out._pending || []).filter(p => !pendingIds.includes(p.id));
                appendOutputImages(out, outputUrls, refs[0], metas);
                addGenerationLog({run, outputs:outputUrls, runMs:Math.max(...metas.map(m => m.runMs || 0), 0)});
                node.runStatus = 'done'; node.runError = '';
                render();
                scheduleSave();
            } catch(err){
                const metas = collectRunMetas(out, pendingIds);
                addGenerationLog({run, outputs:[], runMs:Math.max(...metas.map(m => m.runMs || 0), 0), error:err.message || String(err)});
                out._pending = (out._pending || []).filter(p => !pendingIds.includes(p.id));
                node.runStatus = 'failed'; node.runError = err.message || String(err);
                render();
                if(opts.cascade) throw err;
                alert(err.message || tr('canvas.msFailed'));
            }
        }

        function editDrawPoint(event){
            const canvasEl = editDrawCanvas();
            const rect = canvasEl.getBoundingClientRect();
            return {
                x:(event.clientX - rect.left) * canvasEl.width / Math.max(1, rect.width),
                y:(event.clientY - rect.top) * canvasEl.height / Math.max(1, rect.height),
            };
        }
        function gridCustomLineHit(point){
            if(!gridCustomLines.length) return -1;
            const canvasEl = editDrawCanvas();
            const threshold = Math.max(8, Math.min(canvasEl.width, canvasEl.height) / 80);
            let best = -1;
            let bestDist = Infinity;
            gridCustomLines.forEach((line, index) => {
                const dist = line.type === 'h'
                    ? Math.abs(point.y - line.pos * canvasEl.height)
                    : Math.abs(point.x - line.pos * canvasEl.width);
                if(dist < bestDist && dist <= threshold){
                    best = index;
                    bestDist = dist;
                }
            });
            return best;
        }
        function setGridCustomLinePos(index, point){
            const canvasEl = editDrawCanvas();
            const line = gridCustomLines[index];
            if(!line) return;
            line.pos = line.type === 'h'
                ? Math.max(0.001, Math.min(0.999, point.y / Math.max(1, canvasEl.height)))
                : Math.max(0.001, Math.min(0.999, point.x / Math.max(1, canvasEl.width)));
        }
        function editBrushSize(){

        function beginEditDraw(event){
            if(imageEditMode === 'crop') return;
            if(imageEditMode === 'grid'){
                if(!gridCustomMode) return;
                // 自定义模式：拖动已有线，或点击空白处放置新线
                event.preventDefault();
                event.stopPropagation();
                const canvasEl = editDrawCanvas();
                canvasEl.setPointerCapture?.(event.pointerId);
                const point = editDrawPoint(event);
                const hitIndex = gridCustomLineHit(point);
                gridCustomHistory.push([...gridCustomLines.map(line => ({...line}))]);
                if(hitIndex >= 0){
                    gridCustomDrag = {index: hitIndex, pointerId: event.pointerId};
                    setGridCustomLinePos(hitIndex, point);
                    refreshGridSplitPreview();
                    _syncGridCustomUndoBtn();
                    return;
                }
                const rect = canvasEl.getBoundingClientRect();
                const fracX = Math.max(0.001, Math.min(0.999, (event.clientX - rect.left) / rect.width));
                const fracY = Math.max(0.001, Math.min(0.999, (event.clientY - rect.top) / rect.height));
                gridCustomLines.push({type: gridCustomOrientation, pos: gridCustomOrientation === 'h' ? fracY : fracX});
                gridCustomDrag = {index: gridCustomLines.length - 1, pointerId: event.pointerId};
                _syncGridCustomUndoBtn();
                refreshGridSplitPreview();
                return;
            }
            event.preventDefault();
            event.stopPropagation();
            const canvasEl = editDrawCanvas();
            canvasEl.setPointerCapture?.(event.pointerId);
            const ctx = canvasEl.getContext('2d');
            const p = editDrawPoint(event);
            editDrawState = {x:p.x, y:p.y, pointerId:event.pointerId};
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = editBrushSize();
            ctx.strokeStyle = imageEditMode === 'mask' ? 'rgba(255,255,255,0.78)' : (document.getElementById('paintBrushColor')?.value || '#ff2d55');
            ctx.globalCompositeOperation = 'source-over';
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + 0.01, p.y + 0.01);
            ctx.stroke();
        }

            event.preventDefault();

        function gridSplitRects(width, height){
            if(gridCustomMode) return gridSplitRectsCustom(width, height);
            const {rows, cols, gap} = gridSplitSettings();
            const halfGap = gap / 2;
            const rects = [];
            for(let row = 0; row < rows; row++){
                const topLine = row * height / rows;
                const bottomLine = (row + 1) * height / rows;
                const y1 = Math.round(row === 0 ? 0 : topLine + halfGap);
                const y2 = Math.round(row === rows - 1 ? height : bottomLine - halfGap);
                for(let col = 0; col < cols; col++){
                    const leftLine = col * width / cols;
                    const rightLine = (col + 1) * width / cols;
                    const x1 = Math.round(col === 0 ? 0 : leftLine + halfGap);
                    const x2 = Math.round(col === cols - 1 ? width : rightLine - halfGap);
                    if(x2 > x1 && y2 > y1) rects.push({row, col, x:x1, y:y1, w:x2 - x1, h:y2 - y1});
                }
            }
            return rects;
        }
        function gridSplitRectsCustom(width, height){
            const gap = Math.max(0, Math.min(240, Number(document.getElementById('gridGapSize')?.value || 0)));
            const halfGap = gap / 2;
            // 按方向归类，转换为像素位置（去重并排序）
            const rawH = [...new Set(gridCustomLines.filter(l => l.type === 'h').map(l => l.pos * height))].sort((a, b) => a - b);
            const rawV = [...new Set(gridCustomLines.filter(l => l.type === 'v').map(l => l.pos * width))].sort((a, b) => a - b);
            const hCuts = [0, ...rawH, height]; // 切割边界（含图片两端）
            const vCuts = [0, ...rawV, width];
            const rects = [];
            for(let row = 0; row < hCuts.length - 1; row++){
                for(let col = 0; col < vCuts.length - 1; col++){
                    const y1 = Math.round(row === 0 ? hCuts[row] : hCuts[row] + halfGap);
                    const y2 = Math.round(row === hCuts.length - 2 ? hCuts[row + 1] : hCuts[row + 1] - halfGap);
                    const x1 = Math.round(col === 0 ? vCuts[col] : vCuts[col] + halfGap);
                    const x2 = Math.round(col === vCuts.length - 2 ? vCuts[col + 1] : vCuts[col + 1] - halfGap);
                    if(x2 > x1 && y2 > y1) rects.push({row, col, x:x1, y:y1, w:x2 - x1, h:y2 - y1});
                }
            }
            return rects;
        }

        function refreshGridSplitPreview(){
            const canvasEl = editDrawCanvas();
            const ctx = canvasEl.getContext('2d');
            ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
            if(imageEditMode !== 'grid') return;
            const countEl = document.getElementById('gridSplitCount');
            const lineWidth = Math.max(2, Math.round(Math.min(canvasEl.width, canvasEl.height) / 320));
            const drawGuideLine = (x1, y1, x2, y2) => {
                ctx.save();
                ctx.lineWidth = lineWidth + 2;
                ctx.strokeStyle = 'rgba(2,6,23,0.72)';
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                ctx.lineWidth = lineWidth;
                ctx.strokeStyle = 'rgba(255,255,255,0.92)';
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                ctx.restore();
            };
            if(gridCustomMode){
                // 自定义模式：按已放置线渲染（包含空心范围预览）
                const gap = Math.max(0, Math.min(240, Number(document.getElementById('gridGapSize')?.value || 0)));
                const hLines = gridCustomLines.filter(l => l.type === 'h');
                const vLines = gridCustomLines.filter(l => l.type === 'v');
                if(countEl) countEl.textContent = tr('canvas.gridWillOutput').replace('{n}', (hLines.length + 1) * (vLines.length + 1));
                ctx.save();
                hLines.forEach(l => {
                    const y = l.pos * canvasEl.height;
                    if(gap > 0){
                        drawGuideLine(0, y - gap / 2, canvasEl.width, y - gap / 2);
                        drawGuideLine(0, y + gap / 2, canvasEl.width, y + gap / 2);
                    } else {
                        drawGuideLine(0, y, canvasEl.width, y);
                    }
                });
                vLines.forEach(l => {
                    const x = l.pos * canvasEl.width;
                    if(gap > 0){
                        drawGuideLine(x - gap / 2, 0, x - gap / 2, canvasEl.height);
                        drawGuideLine(x + gap / 2, 0, x + gap / 2, canvasEl.height);
                    } else {
                        drawGuideLine(x, 0, x, canvasEl.height);
                    }
                });
                ctx.restore();
                return;
            }
            // 常规模式
            const {rows, cols, gap} = gridSplitSettings();
            if(countEl) countEl.textContent = tr('canvas.gridWillOutput').replace('{n}', rows * cols);
            ctx.save();
            const scaleX = canvasEl.width;
            const scaleY = canvasEl.height;
            for(let i = 1; i < cols; i++){
                const x = i * scaleX / cols;
                if(gap > 0){
                    drawGuideLine(x - gap / 2, 0, x - gap / 2, scaleY);
                    drawGuideLine(x + gap / 2, 0, x + gap / 2, scaleY);
                } else {
                    drawGuideLine(x, 0, x, scaleY);
                }
            }
            for(let i = 1; i < rows; i++){
                const y = i * scaleY / rows;
                if(gap > 0){
                    drawGuideLine(0, y - gap / 2, scaleX, y - gap / 2);
                    drawGuideLine(0, y + gap / 2, scaleX, y + gap / 2);
                } else {
                    drawGuideLine(0, y, scaleX, y);
                }
            }
            ctx.restore();
        }

        function clampCrop(){
            if(!cropState) return;
            const {w, h} = cropBounds();
            cropState.w = Math.max(24, Math.min(cropState.w, w));
            cropState.h = Math.max(24, Math.min(cropState.h, h));
            cropState.x = Math.max(0, Math.min(cropState.x, w - cropState.w));
            cropState.y = Math.max(0, Math.min(cropState.y, h - cropState.h));
        }
        function beginCropDrag(event, mode){

                cropState.x = cropDrag.start.x + dx;
                cropState.y = cropDrag.start.y + dy;
            } else {

        async function uploadCroppedBlob(blob, name){

        async function uploadImageBlobs(blobs){

        async function applyImageCrop(){
            if(!cropState) return;
            const node = nodes.find(n => n.id === cropState.nodeId);
            const img = document.getElementById('cropImage');
            if(!node || !img.naturalWidth || !img.naturalHeight) return;
            const scaleX = img.naturalWidth / (img.clientWidth || 1);
            const scaleY = img.naturalHeight / (img.clientHeight || 1);
            const sx = Math.max(0, Math.round(cropState.x * scaleX));
            const sy = Math.max(0, Math.round(cropState.y * scaleY));
            const sw = Math.max(1, Math.round(cropState.w * scaleX));
            const sh = Math.max(1, Math.round(cropState.h * scaleY));
            const canvasEl = document.createElement('canvas');
            canvasEl.width = sw;
            canvasEl.height = sh;
            canvasEl.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
            const blob = await new Promise(resolve => canvasEl.toBlob(resolve, 'image/png'));
            if(!blob) return;
            const base = (node.name || 'image').replace(/\.[^.]+$/, '');
            const file = await uploadCroppedBlob(blob, `${base}_crop.png`);
            if(file){
                node.url = file.url;
                node.name = file.name;
                closeImageEditor();
                render();
                scheduleSave();
            }
        }
        async function applyImageMask(){
            if(!cropState) return;
            const node = nodes.find(n => n.id === cropState.nodeId);
            if(!node || !editCanvasHasPixels()) return;
            const src = editDrawCanvas();
            const mask = document.createElement('canvas');
            mask.width = src.width;
            mask.height = src.height;
            const ctx = mask.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, mask.width, mask.height);
            ctx.drawImage(src, 0, 0);
            const blob = await new Promise(resolve => mask.toBlob(resolve, 'image/png'));
            if(!blob) return;
            const base = (node.name || 'image').replace(/\.[^.]+$/, '');
            const file = await uploadCroppedBlob(blob, `${base}_mask.png`);
            if(file){
                addGeneratedImageNode(file, node, 'mask', 28, {role:'mask'});
                closeImageEditor();
                render();
                scheduleSave();
            }
        }
        async function applyImageBrush(){
            if(!cropState) return;
            const node = nodes.find(n => n.id === cropState.nodeId);

            const canvasEl = document.createElement('canvas');
            canvasEl.width = img.naturalWidth;
            canvasEl.height = img.naturalHeight;
            const ctx = canvasEl.getContext('2d');
            ctx.drawImage(img, 0, 0, canvasEl.width, canvasEl.height);
            ctx.drawImage(editDrawCanvas(), 0, 0);
            const blob = await new Promise(resolve => canvasEl.toBlob(resolve, 'image/png'));
            if(!blob) return;
            const base = (node.name || 'image').replace(/\.[^.]+$/, '');

        async function applyImageGridSplit(){
            if(!cropState) return;
            const node = nodes.find(n => n.id === cropState.nodeId);
            const img = document.getElementById('cropImage');
            if(!node || !img.naturalWidth || !img.naturalHeight) return;
            const rects = gridSplitRects(img.naturalWidth, img.naturalHeight);
            if(!rects.length) return;
            const base = (node.name || 'image').replace(/\.[^.]+$/, '');
            const blobs = [];
            for(const rect of rects){
                const canvasEl = document.createElement('canvas');
                canvasEl.width = rect.w;
                canvasEl.height = rect.h;
                canvasEl.getContext('2d').drawImage(img, rect.x, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);
                const blob = await new Promise(resolve => canvasEl.toBlob(resolve, 'image/png'));
                if(blob) blobs.push({blob, name:`${base}_r${rect.row + 1}_c${rect.col + 1}.png`});
            }
            if(!blobs.length) return;
            const files = await uploadImageBlobs(blobs);
            if(files.length){
                const out = imageEditorOutputNode(node);
                const urls = files.map(file => file.url).filter(Boolean);
                appendOutputImages(out, urls, {url:node.url, name:node.name || 'source image'}, urls.map(() => ({runMs:0, run:{prompt:'宫格切分', refs:[{url:node.url, name:node.name || 'source image'}]}})));

                render();
                scheduleSave();
            }

        function bindScrollableText(el){
            if(!el) return;
            const stop = e => e.stopPropagation();
            const beginSelection = e => {
                e.stopPropagation();
                textSelectionGuard = {
                    el,
                    scrollTop:el.scrollTop || 0,
                    scrollLeft:el.scrollLeft || 0,
                    clientY:e.clientY,
                    wheelUntil:0,
                    active:true
                };
            };
            el.addEventListener('mousedown', beginSelection);
            el.addEventListener('mousemove', e => {
                e.stopPropagation();
                if(textSelectionGuard?.el === el) textSelectionGuard.clientY = e.clientY;
            });
            el.addEventListener('mouseup', e => {
                e.stopPropagation();
                if(textSelectionGuard?.el === el) textSelectionGuard.active = false;
            });
            el.addEventListener('mouseleave', e => {
                e.stopPropagation();
                if(textSelectionGuard?.el === el) {
                    el.scrollTop = textSelectionGuard.scrollTop;
                    el.scrollLeft = textSelectionGuard.scrollLeft;
                }
            });
            el.addEventListener('scroll', () => {
                const guard = textSelectionGuard;
                if(!guard || guard.el !== el || !guard.active || Date.now() < guard.wheelUntil) {
                    if(guard?.el === el) {
                        guard.scrollTop = el.scrollTop || 0;
                        guard.scrollLeft = el.scrollLeft || 0;
                    }
                    return;
                }
                const nextTop = el.scrollTop || 0;
                const prevTop = guard.scrollTop || 0;
                const rect = el.getBoundingClientRect();
                const pointerBelow = Number.isFinite(guard.clientY) && guard.clientY > rect.bottom - 10;
                const pointerAbove = Number.isFinite(guard.clientY) && guard.clientY < rect.top + 10;
                const jumpedToTop = prevTop > Math.max(80, el.clientHeight * 0.45) && nextTop < 4 && !pointerAbove;
                const wrongDirectionJump = pointerBelow && nextTop < prevTop - Math.max(40, el.clientHeight * 0.25);

                    requestAnimationFrame(() => {
                        if(textSelectionGuard?.el === el && textSelectionGuard.active) {
                            el.scrollTop = prevTop;
                            el.scrollLeft = guard.scrollLeft || 0;
                        }
                    });
                    return;
                }
                guard.scrollTop = nextTop;
                guard.scrollLeft = el.scrollLeft || 0;
            }, {passive:true});
            el.addEventListener('click', stop);
            el.addEventListener('dblclick', stop);

            const delta = (e.clientY - llmPaneDrag.sy) / viewport.scale;
            const minPane = 70;
            const nextInput = Math.max(minPane, Math.min(total - minPane, llmPaneDrag.inputStart + delta));
            const nextOutput = Math.max(minPane, total - nextInput);
            llmPaneDrag.node.llmInputHeight = Math.round(nextInput);
            llmPaneDrag.node.llmOutputHeight = Math.round(nextOutput);

        function hasComfyWorkflow(name){

        async function ensureComfyWorkflow(name){

        function renderComfyImages(list, node, imageInputs){

                input.oninput = e => updateComfyField(node, input, e);

        function renderComfyCustomField(node, f){
            const value = comfyParamValue(node, f);
            const label = escapeHtml(f.name || f.input);
            if(f.type === 'boolean'){
                return `<div class="gen-settings-row">

        function updateComfyField(node, input, event){
            event?.stopPropagation();

            if(paramId){
                node.comfyParams = node.comfyParams || {};
                const field = comfyFields(node).find(f => f.id === paramId);
                const type = input.dataset.comfyType || field?.type || 'text';
                if(type === 'boolean') node.comfyParams[paramId] = !Boolean(node.comfyParams[paramId] ?? field?.default ?? false);
                else if(type === 'number' || type === 'slider') node.comfyParams[paramId] = Number(input.value) || 0;
                else node.comfyParams[paramId] = input.value;

                scheduleSave();

        function generatorSources(gen){
            return connections.filter(c => c.to === gen.id).map(c => nodes.find(n => n.id === c.from)).filter(Boolean).map(n => {
                if(n.type === 'output' && (n.images||[]).length){
                    // 从 output 节点取最新一张图当作 reference 给下游
                    const last = [...n.images].reverse().find(x => typeof x === 'string');
                    if(last) return {id:n.id, type:'outputImage', label:'上游输出', preview:last, refs:[{url:last, name:'output.png'}], prompt:''};
                }
                if(n.type === 'image' && n.url) return {id:n.id, type:'image', label:n.name || 'image', preview:n.url, refs:[{url:n.url, name:n.name || 'image', role:n.role || ''}], prompt:''};
                if(n.type === 'group') {
                    const items = (n.items || []).map(id => nodes.find(x => x.id === id)).filter(Boolean);
                    const sources = items.filter(x => x.type === 'image' && x.url).map(img => ({
                        id:`${n.id}:${img.id}`,
                        type:'groupImage',
                        groupId:n.id,
                        imageId:img.id,
                        label:img.name || 'image',
                        preview:img.url,
                        refs:[{url:img.url, name:img.name || 'image', role:img.role || ''}],
                        prompt:''
                    }));
                    const prompts = items.filter(x => x.type === 'prompt').map(p => p.text || '').filter(Boolean);
                    if(prompts.length){
                        const combined = prompts.join('\n\n');
                        sources.push({
                            id:`${n.id}:prompts`,
                            type:'groupPrompt',
                            groupId:n.id,
                            label:combined.slice(0, 32),
                            refs:[],
                            prompt:combined
                        });
                    }
                    return sources;
                }
                if(n.type === 'prompt') return {id:n.id, type:'prompt', label:(n.text || '提示词').slice(0, 32), refs:[], prompt:n.text || ''};
                if(n.type === 'loop') {
                    const prompt = renderLoopPrompt(n);
                    return {id:n.id, type:'loop', label:`${tr('canvas.loopNode')} ${loopCount(n)}x`, refs:[], prompt};
                }
                if(n.type === 'promptGroup') {
                    const prompts = (n.items || []).map(id => nodes.find(x => x.id === id)).filter(Boolean).map(p => p.text || '').filter(Boolean);
                    return {id:n.id, type:'promptGroup', label:`提示词 ${prompts.length} 个`, refs:[], prompt:prompts.join('\n\n')};
                }
                if(n.type === 'llm' && (n.mode || 'node') === 'node' && n.outputText) return {id:n.id, type:'llm', label:(n.outputText || 'LLM').slice(0, 32), refs:[], prompt:n.outputText || ''};
                return null;
            }).flat().filter(Boolean);
        }
        function orderedSources(gen, sources){
            gen.inputs = (gen.inputs || []).filter(id => sources.some(s => s.id === id));
            sources.forEach(s => { if(!gen.inputs.includes(s.id)) gen.inputs.push(s.id); });
            return gen.inputs.map(id => sources.find(s => s.id === id)).filter(Boolean);
        }
        function reorderInput(gen, movedId, targetId){
            if(!movedId || movedId === targetId) return;
            const sources = generatorSources(gen);
            const imageIds = sources.filter(s => s.refs?.length).map(s => s.id);
            if(!imageIds.includes(movedId) || !imageIds.includes(targetId)) return;
            const promptIds = (gen.inputs || []).filter(id => !imageIds.includes(id));
            const ids = (gen.inputs || []).filter(id => imageIds.includes(id));
            const from = ids.indexOf(movedId), to = ids.indexOf(targetId);
            if(from < 0 || to < 0) return;
            ids.splice(to, 0, ids.splice(from, 1)[0]);
            gen.inputs = [...ids, ...promptIds];
            render();
            scheduleSave();
        }

        async function runGenerator(genId, opts={}){
            const gen = nodes.find(n => n.id === genId);
            if(!gen || (gen.running && !opts.cascade)) return;
            const sources = orderedSources(gen, generatorSources(gen));
            const prompt = sources.map(s => s.prompt).filter(Boolean).join('\n\n');
            const refs = sources.flatMap(s => s.refs || []);
            if(!prompt && !refs.length){ alert(tr('canvas.needPromptOrImage')); return; }
            const count = Math.max(1, Math.min(8, Number(gen.count || 1)));
            let out = connections.filter(c => c.from === gen.id).map(c => nodes.find(n => n.id === c.to)).find(n => n?.type === 'output');
            if(!out) {
                out = {id:uid('out'), type:'output', x:gen.x + 460, y:gen.y, images:[]};
                nodes.push(out);
                connections.push({id:uid('c'), from:gen.id, to:out.id});
            }
            const pendingIds = Array.from({length:count}, () => uid('p'));
            const run = runSnapshot(gen, prompt || 'Edit the reference images.', refs);
            out._pending = [...(out._pending||[]), ...pendingIds.map(id => makePending(id, run))];
            if(!opts.cascade){ gen.running = true; render(); setTimeout(() => { gen.running = false; render(); }, 2000); }
            try {
                const payload = {
                    prompt: prompt || 'Edit the reference images.',
                    provider_id:resolveImageProviderId(gen.apiProvider || 'comfly'),
                    model:resolveImageModel(gen.model),
                    size:apiImageSize(gen.ratio ?? 'square', gen.resolution || '1k', gen.customRatio || '', gen.customSize || ''),
                    reference_images:refs
                };
                const results = await Promise.all(Array.from({length:count}, () => fetch('/api/online-image', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify(payload)
                }).then(async r => { if(!r.ok) throw new Error(await responseErrorMessage(r, tr('canvas.generationFailed'))); return r.json(); })));
                const images = results.flatMap(result => result.images || []);
                const metas = collectRunMetas(out, pendingIds);
                run.request = results[0] ? requestMetaFromResult(results[0]) : {};
                out._pending = (out._pending||[]).filter(p => !pendingIds.includes(p.id));
                appendOutputImages(out, images, refs[0], metas);
                addGenerationLog({run, outputs:images, runMs:Math.max(...metas.map(m => m.runMs || 0), 0)});
                gen.runStatus = 'done'; gen.runError = '';
                render();
                scheduleSave();
            } catch(err) {
                const metas = collectRunMetas(out, pendingIds);
                addGenerationLog({run, outputs:[], runMs:Math.max(...metas.map(m => m.runMs || 0), 0), error:err.message || String(err)});
                out._pending = (out._pending||[]).filter(p => !pendingIds.includes(p.id));
                gen.runStatus = 'failed'; gen.runError = err.message || String(err);
                render();
                if(opts.cascade) throw err;
                showErrorModal(err.message || tr('canvas.generationFailed'), tr('canvas.apiFailed'));
            }
        }

        async function uploadCanvasUrlToComfy(url){
            const blob = await fetch(url).then(r => {
                if(!r.ok) throw new Error(langIsEn() ? 'Image read failed' : '图片读取失败');
                return r.blob();
            });
            const filename = (url || '').split('/').pop()?.split('?')[0] || `canvas_${Date.now()}.png`;
            const form = new FormData();
            form.append('files', blob, filename);
            const data = await fetch('/api/upload', {method:'POST', body:form}).then(async r => {
                if(!r.ok) throw new Error(await responseErrorMessage(r, langIsEn() ? 'Image upload to ComfyUI failed' : '图片上传到 ComfyUI 失败'));
                return r.json();
            });
            return data.files?.[0]?.comfy_name || filename;
        }
        async function comfyNameForRef(ref){
            if(ref.comfy_name) return ref.comfy_name;
            if(!ref.url) throw new Error(langIsEn() ? 'Missing input image' : '缺少输入图片');
            return uploadCanvasUrlToComfy(ref.url);
        }
        async function runComfyUpscale(imageUrl, resolution){
            if(!imageUrl) throw new Error(actionFailed('studio.superResolution', langIsEn() ? 'missing input image' : '缺少输入图片'));
            const nextInput = await uploadCanvasUrlToComfy(imageUrl);
            const upscale = await fetch('/api/generate', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    workflow_json:'upscale.json',
                    params:{
                        "15": { image:nextInput },
                        "172": { seed:Math.floor(Math.random() * 4294967295), resolution:Number(resolution || 2048) }
                    },
                    type:'enhance',
                    client_id:CLIENT_ID
                })
            }).then(async r => { if(!r.ok) throw new Error(await responseErrorMessage(r, actionFailed('studio.superResolution'))); return r.json(); });
            if(upscale.error) throw new Error(actionFailed('studio.superResolution', upscale.error));
            if(!upscale.images?.length) throw new Error(noReturnedImage('studio.superResolution'));
            return upscale.images || [];
        }
        function comfyResultOutputs(result){

        async function runComfyNode(nodeId, opts={}){
            const node = nodes.find(n => n.id === nodeId);
            if(!node || (node.running && !opts.cascade)) return;
            const sources = orderedSources(node, generatorSources(node));
            const prompt = sources.map(s => s.prompt).filter(Boolean).join('\n\n');
            const refs = sources.flatMap(s => s.refs || []);
            const mode = node.mode || 'text';
            const customImageFields = mode === 'custom' ? comfyFields(node, 'image') : [];
            const customPromptFields = mode === 'custom' ? comfyFields(node, 'prompt') : [];
            if((mode === 'text' || (mode === 'custom' && customPromptFields.length)) && !prompt){ alert(tr('canvas.needPrompt')); return; }
            if((mode !== 'text' && mode !== 'custom' && !refs.length) || (mode === 'custom' && refs.length < customImageFields.length)){ alert(tr('canvas.needImage')); return; }
            let out = connections.filter(c => c.from === node.id).map(c => nodes.find(n => n.id === c.to)).find(n => n?.type === 'output');
            if(!out) {
                out = {id:uid('out'), type:'output', x:node.x + 480, y:node.y, images:[]};
                nodes.push(out);
                connections.push({id:uid('c'), from:node.id, to:out.id});
            }
            const pendingId = uid('p');
            const run = runSnapshot(node, prompt, refs);
            run.taskLabel = comfyRunLabel(node);
            out._pending = [...(out._pending||[]), makePending(pendingId, run)];
            if(!opts.cascade){ node.running = true; render(); setTimeout(() => { node.running = false; render(); }, 2000); }
            try {
                let images = [];
                if(mode === 'text'){
                    run.taskLabel = tr('canvas.comfyText');
                    const result = await fetch('/api/generate', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            prompt,
                            width:Number(node.width || 1024),
                            height:Number(node.height || 1024),
                            workflow_json:'Z-Image.json',
                            type:'zimage',
                            client_id:CLIENT_ID
                        })
                    }).then(async r => { if(!r.ok) throw new Error(await responseErrorMessage(r, actionFailed('canvas.comfyText'))); return r.json(); });
                    run.request = requestMetaFromResult(result);
                    images = comfyResultOutputs(result);
                } else if(mode === 'enhance'){
                    run.taskLabel = tr('canvas.comfyEnhance');
                    const inputName = await comfyNameForRef(refs[0]);
                    const enhance = await fetch('/api/generate', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            workflow_json:'Z-Image-Enhance.json',
                            params:{
                                "15": { image:inputName },
                                "204": { value:Number(node.enhanceStrength ?? 0.5) }
                            },
                            type:'enhance',
                            client_id:CLIENT_ID
                        })
                    }).then(async r => { if(!r.ok) throw new Error(await responseErrorMessage(r, actionFailed('canvas.comfyEnhance'))); return r.json(); });
                    run.request = requestMetaFromResult(enhance);
                    if(enhance.error) throw new Error(actionFailed('canvas.comfyEnhance', enhance.error));
                    if(!enhance.images?.length) throw new Error(noReturnedImage('canvas.comfyEnhance'));
                    if(node.enhanceUpscale){
                        images = await runComfyUpscale(enhance.images?.[0], node.enhanceUpscaleRes || 2048);
                    } else {
                        images = enhance.images || [];
                    }
                } else if(mode === 'custom'){
                    const workflowName = validComfyWorkflowName(node.comfyWorkflow || comfyWorkflows[0]?.name || '');
                    run.taskLabel = workflowName || tr('canvas.comfyCustom');
                    if(node.comfyWorkflow && node.comfyWorkflow !== workflowName) node.comfyWorkflow = workflowName;
                    const wf = await ensureComfyWorkflow(workflowName);
                    if(!workflowName || !wf) throw new Error(tr('canvas.comfyNoWorkflow'));
                    const fields = wf?.config?.fields || [];
                    const params = {};
                    const imageFields = fields.filter(f => comfyFieldKind(f) === 'image');
                    const promptFields = fields.filter(f => comfyFieldKind(f) === 'prompt');
                    const settingFields = fields.filter(f => comfyFieldKind(f) === 'setting');
                    const names = [];
                    for(const ref of refs.slice(0, imageFields.length)) names.push(await comfyNameForRef(ref));
                    imageFields.forEach((f, i) => {
                        if(!f.node || !f.input) return;
                        params[f.node] = params[f.node] || {};
                        params[f.node][f.input] = names[i] || '';
                    });
                    promptFields.forEach(f => {
                        if(!f.node || !f.input) return;
                        params[f.node] = params[f.node] || {};
                        params[f.node][f.input] = prompt;
                    });
                    settingFields.forEach(f => {
                        if(!f.node || !f.input) return;
                        params[f.node] = params[f.node] || {};
                        params[f.node][f.input] = comfyParamValue(node, f);
                    });
                    const result = await fetch('/api/generate', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            prompt,
                            workflow_json:workflowName,
                            params,
                            type:'workflow-custom',
                            client_id:CLIENT_ID
                        })
                    }).then(async r => { if(!r.ok) throw new Error(await responseErrorMessage(r, actionFailed('canvas.comfyCustom'))); return r.json(); });
                    run.request = requestMetaFromResult(result);
                    if(result.error) throw new Error(actionFailed('canvas.comfyCustom', result.error));
                    images = comfyResultOutputs(result);
                    if(!images.length) throw new Error(noReturnedImage('canvas.comfyCustom'));
                } else {
                    run.taskLabel = tr('canvas.comfyEdit');
                    const names = [];
                    for (const ref of refs.slice(0, 3)) names.push(await comfyNameForRef(ref));
                    const result = await fetch('/api/generate', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            prompt,
                            workflow_json:'Flux2-Klein.json',
                            type:'klein',
                            params:{
                                "168": { text:prompt },
                                "158": { noise_seed:Math.floor(Math.random() * 1000000) },
                                "278": { image:names[0] || "" },
                                "270": { image:names[1] || "" },
                                "292": { image:names[2] || "" },
                                "313": { value:Boolean(names[1]) },
                                "314": { value:Boolean(names[2]) }
                            },
                            client_id:CLIENT_ID
                        })
                    }).then(async r => { if(!r.ok) throw new Error(await responseErrorMessage(r, actionFailed('canvas.comfyEdit'))); return r.json(); });
                    run.request = requestMetaFromResult(result);
                    if(result.error) throw new Error(actionFailed('canvas.comfyEdit', result.error));
                    if(!result.images?.length) throw new Error(noReturnedImage('canvas.comfyEdit'));
                    images = node.editUpscale ? await runComfyUpscale(result.images?.[0], node.editUpscaleRes || 2048) : result.images || [];
                }
                const meta = collectRunMeta(out, pendingId);
                out._pending = (out._pending||[]).filter(p => p.id !== pendingId);
                appendOutputImages(out, images, refs[0], [meta]);
                addGenerationLog({run, outputs:images, runMs:meta.runMs || 0});
                node.runStatus = 'done'; node.runError = '';
                render();
                scheduleSave();
            } catch(err) {
                const meta = collectRunMeta(out, pendingId);
                addGenerationLog({run, outputs:[], runMs:meta.runMs || 0, error:err.message || String(err)});
                out._pending = (out._pending||[]).filter(p => p.id !== pendingId);
                node.runStatus = 'failed'; node.runError = err.message || String(err);
                render();
                if(opts.cascade) throw err;
                alert(err.message || actionFailed('canvas.comfyGenerate'));
            }
        }
